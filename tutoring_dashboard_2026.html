<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ιδιαίτερα 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;900&family=Literata:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0f1a; --surf:#111827; --surf2:#1a2235; --border:rgba(30,45,69,0.8);
  --text:#f1f5f9; --text2:#94a3b8; --text3:#64748b;
  --cyan:#06b6d4; --cyan2:#22d3ee;
  --blue:#3b82f6; --blue2:#60a5fa;
  --green:#10b981; --green2:#34d399;
  --amber:#f59e0b; --amber2:#fbbf24;
  --rose:#f43f5e; --rose2:#fb7185;
  --violet:#8b5cf6; --violet2:#a78bfa;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ── HEADER ── */
header{background:var(--surf);border-bottom:1px solid var(--border);padding:11px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  position:sticky;top:0;z-index:50}
.logo{font-weight:700;font-size:15px;color:var(--cyan)}
.logo small{color:var(--text3);font-weight:400;font-size:11px;margin-left:8px}
.hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sync-badge{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--surf2);color:var(--text3)}
.sync-badge.ok{color:var(--green);border-color:rgba(16,185,129,.35)}
.sync-badge.err{color:var(--rose);border-color:rgba(244,63,94,.35)}
.sync-badge.busy{color:var(--amber);border-color:rgba(245,158,11,.35)}

/* ── TABS ── */
.tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--border);padding:0 20px}
.tab{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text3);
  border-bottom:2px solid transparent;transition:color .15s,border-color .15s;user-select:none}
.tab.on{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab:hover:not(.on){color:var(--text2)}

/* ── MAIN ── */
main{padding:16px 20px;max-width:1200px;margin:0 auto}
.panel{display:none}.panel.on{display:block}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;
  border:1px solid transparent;cursor:pointer;font-family:'Sora',sans-serif;
  font-size:12px;font-weight:600;transition:filter .15s}
.btn:hover{filter:brightness(1.15)}
.btn-cyan{background:rgba(6,182,212,.14);color:var(--cyan);border-color:rgba(6,182,212,.3)}
.btn-green{background:rgba(16,185,129,.14);color:var(--green);border-color:rgba(16,185,129,.3)}
.btn-rose{background:rgba(244,63,94,.12);color:var(--rose);border-color:rgba(244,63,94,.3)}
.btn-ghost{background:var(--surf2);color:var(--text2);border-color:var(--border)}
.btn-sm{padding:4px 10px;font-size:11px}

/* ── STAT BOXES ── */
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.sbox{flex:1;min-width:88px;background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 14px}
.sbox-val{font-size:20px;font-weight:700;color:var(--cyan)}
.sbox-lbl{font-size:10px;color:var(--text3);font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/* ── STUDENT CARDS ── */
.s-list{display:flex;flex-direction:column;gap:8px}
.s-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
/* Header row — always visible */
.s-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;flex-wrap:wrap;cursor:pointer;user-select:none}
.s-num{width:22px;height:22px;border-radius:50%;background:var(--surf2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--text3);flex-shrink:0}
.s-name{font-weight:700;font-size:14px;min-width:100px}
.s-cls{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;flex-shrink:0}
.cls-g{background:rgba(6,182,212,.15);color:var(--cyan)}
.cls-b{background:rgba(139,92,246,.15);color:var(--violet)}
.s-schedule{font-size:11px;color:var(--text3);flex:1;min-width:120px}
.s-price{font-size:12px;font-weight:700;color:var(--green);min-width:36px;text-align:right}
.s-prog{font-size:11px;color:var(--text3);min-width:36px;text-align:right}
.s-edit-btn{margin-left:auto;flex-shrink:0}
.s-card.open .chevron{transform:rotate(180deg)}

/* Sessions chips — always visible, directly under header */
.s-chips{padding:8px 14px 12px;border-top:1px solid var(--border);display:none}
.s-card.open .s-chips{display:block}
.s-week-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.s-week-row:last-child{margin-bottom:0}
.wk-lbl{font-size:10px;color:var(--text3);font-weight:700;min-width:44px;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;
  transition:filter .15s,box-shadow .15s;user-select:none}
.chip:hover{filter:brightness(1.2);box-shadow:0 0 0 2px rgba(255,255,255,.08)}
.chip-icon{font-size:10px;pointer-events:none}
.ch-scheduled{background:rgba(6,182,212,.12);color:var(--cyan2);border-color:rgba(6,182,212,.25)}
.ch-completed{background:rgba(16,185,129,.14);color:var(--green2);border-color:rgba(16,185,129,.3)}
.ch-absent{background:rgba(244,63,94,.12);color:var(--rose2);border-color:rgba(244,63,94,.28)}
.ch-cancelled{background:rgba(100,116,139,.12);color:var(--text3);border-color:rgba(100,116,139,.2)}

/* Edit form — hidden by default */
.s-form{display:none;border-top:1px solid var(--border);padding:12px 14px}
.s-form.open{display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg.full{grid-column:1/-1}
.fg label{font-size:10px;color:var(--text3);font-weight:700;
  text-transform:uppercase;letter-spacing:.05em}
input,select,textarea{background:var(--surf2);border:1px solid var(--border);color:var(--text);
  border-radius:7px;padding:6px 9px;font-family:'Sora',sans-serif;font-size:12px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:rgba(6,182,212,.5)}
select option{background:var(--surf2)}
.form-actions{display:flex;gap:8px;margin-top:10px}

/* ── WEEK VIEW ── */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.wk-btn{background:var(--surf2);border:1px solid var(--border);color:var(--text2);
  border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px;transition:all .15s}
.wk-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.wk-title{font-size:14px;font-weight:700;flex:1;text-align:center}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.day-col{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.day-col.today{border-color:rgba(6,182,212,.45)}
.day-hdr{padding:8px 10px;background:var(--surf2);border-bottom:1px solid var(--border);
  text-align:center;font-size:11px;font-weight:700;color:var(--text2)}
.day-col.today .day-hdr{color:var(--cyan)}
.day-empty{padding:12px;font-size:11px;color:var(--text3);text-align:center}
.slot{padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.slot:last-child{border-bottom:none}
.slot:hover{background:var(--surf2)}
.slot-time{font-size:10px;color:var(--text3);margin-bottom:2px}
.slot-name{font-size:12px;font-weight:600}
.slot-badge{display:inline-block;font-size:9px;padding:1px 7px;border-radius:10px;
  font-weight:700;margin-top:3px}
.sb-scheduled{background:rgba(6,182,212,.15);color:var(--cyan)}
.sb-completed{background:rgba(16,185,129,.15);color:var(--green)}
.sb-absent{background:rgba(244,63,94,.12);color:var(--rose)}
.sb-cancelled{background:rgba(100,116,139,.14);color:var(--text3)}

/* ── PERIOD SUBTABS ── */
.subtabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.stab{padding:8px 16px;cursor:pointer;font-size:12px;font-weight:600;
  color:var(--text3);border-bottom:2px solid transparent;transition:all .15s}
.stab.on{color:var(--cyan);border-bottom-color:var(--cyan)}
.stab:hover:not(.on){color:var(--text2)}
.spanel{display:none}.spanel.on{display:block}

/* Period stats */
.period-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.pc{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pc-name{font-weight:700;font-size:13px}
.pc-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.prog-bar{background:var(--surf2);border-radius:4px;height:5px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;background:var(--cyan);border-radius:4px;transition:width .4s}
.prog-lbl{font-size:10px;color:var(--text3)}

/* Summary table */
.tbl-wrap{overflow-x:auto}
table.stbl{width:100%;border-collapse:collapse;font-size:12px}
.stbl th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;
  color:var(--text3);text-transform:uppercase;letter-spacing:.06em;
  border-bottom:1px solid var(--border);background:var(--surf2);white-space:nowrap}
.stbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.stbl tbody tr:hover{background:var(--surf2)}
.stbl tfoot td{font-weight:700;border-top:2px solid var(--border);background:var(--surf2)}
.stbl .r{text-align:right}
.mini-bar{display:flex;align-items:center;gap:6px}
.mini-bar-bg{flex:1;background:var(--surf2);border-radius:3px;height:5px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:3px}

/* Calendar */
.cal-months{display:flex;flex-direction:column;gap:24px}
.cal-month-lbl{font-size:14px;font-weight:700;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{text-align:center;font-size:10px;font-weight:700;color:var(--text3);
  padding:4px 0;text-transform:uppercase}
.cal-cell{background:var(--surf);border:1px solid var(--border);border-radius:8px;
  min-height:70px;padding:4px;overflow:hidden}
.cal-cell.today-cell{border-color:rgba(6,182,212,.5)}
.cal-cell.empty-cell{background:transparent;border-color:transparent;min-height:0}
.cal-cell.weekend-cell{opacity:.4}
.cal-dn{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:2px}
.today-cell .cal-dn{color:var(--cyan)}
.cal-ev{font-size:9px;padding:2px 5px;border-radius:4px;margin-bottom:1px;
  cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:filter .12s}
.cal-ev:hover{filter:brightness(1.25)}
.cal-legend{display:flex;flex-wrap:wrap;gap:8px;padding:10px 12px;
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px}
.leg-item{display:inline-flex;align-items:center;gap:4px;font-size:10px}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── SESSION MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px}
.overlay.hidden{display:none}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:14px;font-weight:700}
.modal-x{background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:20px;line-height:1;padding:0}
.modal-x:hover{color:var(--text)}
.modal-body{display:flex;flex-direction:column;gap:10px}
.modal-footer{display:flex;gap:8px;margin-top:14px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surf);
  border:1px solid var(--border);border-radius:var(--r);
  padding:10px 15px;font-size:12px;z-index:400;
  transform:translateY(60px);opacity:0;transition:all .28s;
  max-width:280px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:rgba(16,185,129,.4);color:var(--green)}
.toast.err{border-color:rgba(244,63,94,.4);color:var(--rose)}

/* ── RESPONSIVE ── */
@media(max-width:680px){
  .day-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .stats{gap:6px}
  .s-hdr{gap:7px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">📚 Ιδιαίτερα 2026 <small>15/6 – 18/7 · 5 εβδομάδες</small></div>
  <div class="hdr-right">
    <span class="sync-badge" id="syncBadge">⬤ Τοπικά</span>
    <button class="btn btn-cyan btn-sm" id="btnLoad">⬇ Φόρτωση</button>
    <button class="btn btn-green btn-sm" id="btnSave">⬆ Αποθήκευση</button>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <div class="tab on" data-tab="students">👤 Μαθητές</div>
  <div class="tab" data-tab="week">📅 Εβδομάδα</div>
  <div class="tab" data-tab="period">📊 Περίοδος</div>
</div>

<main>

<!-- ══ ΜΑΘΗΤΕΣ ══ -->
<div class="panel on" id="tab-students">
  <div class="stats" id="statsBar"></div>
  <div class="s-list" id="studentList"></div>
</div>

<!-- ══ ΕΒΔΟΜΑΔΑ ══ -->
<div class="panel" id="tab-week">
  <div class="week-nav">
    <button class="wk-btn" id="wkPrev">←</button>
    <div class="wk-title" id="wkTitle"></div>
    <button class="wk-btn" id="wkNext">→</button>
  </div>
  <div class="day-grid" id="dayGrid"></div>
</div>

<!-- ══ ΠΕΡΙΟΔΟΣ ══ -->
<div class="panel" id="tab-period">
  <div class="stats" id="periodStats"></div>
  <div class="subtabs">
    <div class="stab on" data-stab="table">📋 Πίνακας</div>
    <div class="stab" data-stab="cards">🃏 Κάρτες</div>
    <div class="stab" data-stab="calendar">🗓 Ημερολόγιο</div>
  </div>
  <div class="spanel on" id="stab-table"></div>
  <div class="spanel" id="stab-cards"></div>
  <div class="spanel" id="stab-calendar"></div>
</div>

</main>

<!-- SESSION MODAL -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-x" id="modalX">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
'use strict';

/* ══════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════ */
const GAS = 'https://script.google.com/macros/s/AKfycbzGCMc7MVeLThdckb5OqmNfnumbLfo9YPp8LG8Qvpp4p6CC0uNp_WkK3l39ArutMYkS/exec';
const LS_KEY = 'tutoring2026v3';

const DAYS_GR  = ['Δευ','Τρί','Τετ','Πέμ','Παρ'];
const DAY_FULL = {Δευ:'Δευτέρα',Τρί:'Τρίτη',Τετ:'Τετάρτη',Πέμ:'Πέμπτη',Παρ:'Παρασκευή'};
const DAY_OFF  = {Δευ:0,Τρί:1,Τετ:2,Πέμ:3,Παρ:4};

const ST_LABEL = {scheduled:'Προγρ.',completed:'Έγινε',absent:'Απών/ούσα',cancelled:'Ακυρώθηκε'};
const ST_ICON  = {scheduled:'📅',completed:'✅',absent:'❌',cancelled:'🚫'};
const ST_CHIP  = {scheduled:'ch-scheduled',completed:'ch-completed',absent:'ch-absent',cancelled:'ch-cancelled'};
const ST_BADGE = {scheduled:'sb-scheduled',completed:'sb-completed',absent:'sb-absent',cancelled:'sb-cancelled'};
const ST_COLOR_G = {scheduled:'var(--cyan)',completed:'var(--green)',absent:'var(--rose)',cancelled:'var(--text3)'};

const WEEKS = [
  {n:1, start:'2026-06-15', label:'Εβδ. 1 — 15–21 Ιουν.'},
  {n:2, start:'2026-06-22', label:'Εβδ. 2 — 22–28 Ιουν.'},
  {n:3, start:'2026-06-29', label:'Εβδ. 3 — 29 Ιουν. – 5 Ιουλ.'},
  {n:4, start:'2026-07-06', label:'Εβδ. 4 — 6–12 Ιουλ.'},
  {n:5, start:'2026-07-13', label:'Εβδ. 5 — 13–19 Ιουλ.'},
];

// Student calendar colors (11 students)
const S_COLORS = [
  {bg:'rgba(6,182,212,.2)',  fg:'#22d3ee'},
  {bg:'rgba(59,130,246,.2)', fg:'#60a5fa'},
  {bg:'rgba(16,185,129,.2)', fg:'#34d399'},
  {bg:'rgba(245,158,11,.2)', fg:'#fbbf24'},
  {bg:'rgba(244,63,94,.2)',  fg:'#fb7185'},
  {bg:'rgba(139,92,246,.2)', fg:'#a78bfa'},
  {bg:'rgba(236,72,153,.2)', fg:'#f472b6'},
  {bg:'rgba(20,184,166,.2)', fg:'#2dd4bf'},
  {bg:'rgba(234,179,8,.2)',  fg:'#facc15'},
  {bg:'rgba(249,115,22,.2)', fg:'#fb923c'},
  {bg:'rgba(100,116,139,.2)',fg:'#94a3b8'},
];

/* ══════════════════════════════════════════
   DATE HELPERS (timezone-safe, always local)
══════════════════════════════════════════ */
function parseDate(s) {                       // '2026-06-16' → local Date
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function dateStr(d) {                         // local Date → 'YYYY-MM-DD'
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function todayStr() { return dateStr(new Date()); }

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

// Week starts as local Dates
const WEEK_STARTS = WEEKS.map(w => parseDate(w.start));

function weekNumFor(ds) {       // dateStr → week number (1-5) or 0
  for (let i = WEEKS.length-1; i >= 0; i--)
    if (ds >= WEEKS[i].start) return WEEKS[i].n;
  return 0;
}

function fmtShort(ds) {         // '2026-06-16' → '16 Ιουν'
  if (!ds) return '';
  return parseDate(ds).toLocaleDateString('el-GR',{day:'numeric',month:'short'});
}
function fmtFull(ds) {          // '2026-06-16' → 'Τρί 16 Ιουν'
  if (!ds) return '';
  return parseDate(ds).toLocaleDateString('el-GR',{weekday:'short',day:'numeric',month:'short'});
}
function fmtLocal(d) {          // Date → '16 Ιουν'
  return d.toLocaleDateString('el-GR',{day:'numeric',month:'short'});
}

/* ══════════════════════════════════════════
   DEFAULT DATA
══════════════════════════════════════════ */
const DEFAULT_STUDENTS = [
  {id:'s1',  name:'Ελπίδα',    cls:'Γ΄', day1:'Τρί', time1:'09:00', day2:'Πέμ', time2:'09:00', price:70,  paid:0, notes:'', updatedAt:''},
  {id:'s2',  name:'Γιώργος',   cls:'Γ΄', day1:'Τρί', time1:'14:00', day2:'Παρ', time2:'13:00', price:70,  paid:0, notes:'', updatedAt:''},
  {id:'s3',  name:'Δέσποινα',  cls:'Γ΄', day1:'Τρί', time1:'09:30', day2:'Πέμ', time2:'09:00', price:80,  paid:0, notes:'', updatedAt:''},

  {id:'s5',  name:'Νότα',      cls:'Γ΄', day1:'Δευ', time1:'14:00', day2:'Πέμ', time2:'14:00', price:80,  paid:0, notes:'', updatedAt:''},

  {id:'s11', name:'Εβελίνα',   cls:'Β΄', day1:'Τρί', time1:'19:00', day2:'Πέμ', time2:'19:00', price:100, paid:0, notes:'Ξεκινά Σεπτ.', updatedAt:''},
];

function generateSessions() {
  const sess = [];
  let n = 1;
  DEFAULT_STUDENTS.forEach(st => {
    // Ευφημία: 3 εβδ, day1 μόνο | Γ΄: 5 εβδ, day1+day2 | Β΄ υπόλοιποι: 0
    const weeks = (st.id === 's8') ? 3 : (st.cls === 'Γ΄') ? 5 : 0;
    const slots = (st.id === 's8')
      ? [[st.day1, st.time1]]
      : [[st.day1, st.time1], [st.day2, st.time2]].filter(([d]) => d);

    for (let w = 0; w < weeks; w++) {
      const ws = WEEK_STARTS[w];
      slots.forEach(([day, time]) => {
        const d = addDays(ws, DAY_OFF[day]);
        sess.push({
          id: `sess${n++}`,
          studentId: st.id, studentName: st.name, cls: st.cls,
          weekNum: w+1, date: dateStr(d), time,
          status: 'scheduled', note: '', price: st.price, paid: false, updatedAt: ''
        });
      });
    }
  });
  return sess;
}

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let S = {
  students: JSON.parse(JSON.stringify(DEFAULT_STUDENTS)),
  sessions: generateSessions(),
};

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p.students?.length) S.students = p.students;
    if (p.sessions?.length) S.sessions = p.sessions;
  } catch(e) { console.warn('loadLocal:', e); }
}
function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch(e) {}
}

function mergeByTs(local, remote, key) {
  const map = {};
  local.forEach(x => map[x[key]] = x);
  remote.forEach(x => {
    const ex = map[x[key]];
    if (!ex || +new Date(x.updatedAt||0) > +new Date(ex.updatedAt||0))
      map[x[key]] = x;
  });
  return Object.values(map);
}

/* ══════════════════════════════════════════
   SYNC
══════════════════════════════════════════ */
function setSyncBadge(type, msg) {
  const el = document.getElementById('syncBadge');
  el.className = 'sync-badge ' + type;
  el.textContent = msg;
}
function nowTime() {
  return new Date().toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'});
}

async function loadFromSheet() {
  setSyncBadge('busy','⟳ Φόρτωση…');
  try {
    const r = await fetch(GAS + '?action=getAll');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (d.students?.length) S.students = mergeByTs(S.students, d.students, 'id');
    if (d.sessions?.length) S.sessions = mergeByTs(S.sessions, d.sessions, 'id');
    saveLocal();
    setSyncBadge('ok', '✓ ' + nowTime());
    renderAll();
    toast('Φορτώθηκε από Sheet', 'ok');
  } catch(e) {
    setSyncBadge('err', '✗ Σφάλμα');
    toast('Σφάλμα φόρτωσης: ' + e.message, 'err');
  }
}

async function saveToSheet() {
  setSyncBadge('busy','⟳ Αποθήκευση…');
  const now = new Date().toISOString();
  S.students.forEach(s => { if (!s.updatedAt) s.updatedAt = now; });
  S.sessions.forEach(s => { if (!s.updatedAt) s.updatedAt = now; });
  saveLocal();
  try {
    const r1 = await fetch(GAS, {method:'POST',
      body: JSON.stringify({action:'saveStudents', students: S.students})});
    const d1 = await r1.json();
    if (d1.status !== 'ok') throw new Error(d1.message || 'students error');

    const r2 = await fetch(GAS, {method:'POST',
      body: JSON.stringify({action:'saveSessions', sessions: S.sessions})});
    const d2 = await r2.json();
    if (d2.status !== 'ok') throw new Error(d2.message || 'sessions error');

    setSyncBadge('ok', '✓ ' + nowTime());
    toast('Αποθηκεύτηκε στο Sheet', 'ok');
  } catch(e) {
    setSyncBadge('err', '✗ Σφάλμα');
    toast('Σφάλμα αποθήκευσης: ' + e.message, 'err');
  }
}

/* ── Calendar ── */
function renderCalendar() {
  const colorMap = {};
  S.students.forEach((st,i) => colorMap[st.id] = S_COLORS[i % S_COLORS.length]);

  const sessMap = {};
  S.sessions.forEach(s => (sessMap[s.date] = sessMap[s.date]||[]).push(s));

  const tod = todayStr();
  const MONTH_DEF = [{y:2026,m:5,name:'Ιούνιος 2026'},{y:2026,m:6,name:'Ιούλιος 2026'}];
  const DH = ['Δευ','Τρί','Τετ','Πέμ','Παρ','Σάβ','Κυρ'];

  const legend = S.students.map((st,i) => {
    const c = S_COLORS[i%S_COLORS.length];
    return `<span class="leg-item" style="color:${c.fg}">
      <span class="leg-dot" style="background:${c.bg};border:1px solid ${c.fg}"></span>${st.name}
    </span>`;
  }).join('');

  const months = MONTH_DEF.map(({y,m,name}) => {
    const first  = new Date(y,m,1);
    const last   = new Date(y,m+1,0).getDate();
    let startDow = (first.getDay()+6)%7; // Mon=0

    let cells = DH.map(d=>`<div class="cal-dh">${d}</div>`).join('');
    for(let i=0;i<startDow;i++) cells+=`<div class="cal-cell empty-cell"></div>`;

    for(let day=1;day<=last;day++){
      const ds  = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dow = new Date(y,m,day).getDay();
      const wkd = dow===0||dow===6;
      const isT = ds===tod;
      const evs = (sessMap[ds]||[]).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
      const evHtml = evs.map(s => {
        const c = colorMap[s.studentId]||{bg:'rgba(100,116,139,.2)',fg:'#94a3b8'};
        const ico = s.status==='completed'?'✓ ':s.status==='absent'?'✗ ':s.status==='cancelled'?'✕ ':'';
        return `<div class="cal-ev" data-sessid="${s.id}"
          style="background:${c.bg};color:${c.fg}"
          title="${s.studentName} ${s.time} — ${ST_LABEL[s.status]}">${ico}${s.studentName} ${s.time}</div>`;
      }).join('');
      cells += `<div class="cal-cell${isT?' today-cell':''}${wkd?' weekend-cell':''}">
        <div class="cal-dn">${day}</div>${evHtml}</div>`;
    }
    return `<div><div class="cal-month-lbl">${name}</div><div class="cal-grid">${cells}</div></div>`;
  }).join('');

  document.getElementById('stab-calendar').innerHTML =
    `<div class="cal-legend">${legend}</div>
     <div class="cal-months">${months}</div>`;
}

}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  editId = null;
}

// Close on backdrop click
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.getElementById('modalX').onclick = closeModal;

/* ══════════════════════════════════════════
   EVENT DELEGATION — single listener for everything
══════════════════════════════════════════ */
document.addEventListener('click', e => {
  // Session chips, week slots, calendar events
  const sessEl = e.target.closest('[data-sessid]');
  if (sessEl) { e.stopPropagation(); openModal(sessEl.dataset.sessid); return; }

  // Accordion toggle (header click — but not if clicking edit btn or chip)
  const toggleEl = e.target.closest('[data-toggle]');
  if (toggleEl && !e.target.closest('[data-edit]') && !e.target.closest('[data-sessid]') && !e.target.closest('[data-close-form]')) {
    document.getElementById('sc-' + toggleEl.dataset.toggle)?.classList.toggle('open');
    return;
  }

  // Edit form toggle
  const editBtn = e.target.closest('[data-edit]');
  if (editBtn) {
    const id   = editBtn.dataset.edit;
    const form = document.getElementById('form-' + id);
    if (form) form.classList.toggle('open');
    return;
  }

  // Close form button
  const closeBtn = e.target.closest('[data-close-form]');
  if (closeBtn) {
    const form = document.getElementById('form-' + closeBtn.dataset.closeForm);
    if (form) form.classList.remove('open');
    return;
  }

  // Student form field change (input/select/textarea inside form)
  const field = e.target.closest('[data-sid][data-f]');
  // handled via 'change' event below
});

// Form field changes
document.addEventListener('change', e => {
  const el = e.target.closest('[data-sid][data-f]');
  if (!el) return;
  const st = S.students.find(s => s.id === el.dataset.sid);
  if (!st) return;
  const f = el.dataset.f;
  st[f] = (f==='price'||f==='paid') ? (+el.value||0) : el.value;
  st.updatedAt = new Date().toISOString();
  saveLocal();
  renderStatsBar();
  // Update header text in card
  const card = document.getElementById('sc-' + st.id);
  if (card) {
    const sch = card.querySelector('.s-schedule');
    if (sch) sch.textContent = st.day1+' '+st.time1+(st.day2?' · '+st.day2+' '+st.time2:'');
    const pr = card.querySelector('.s-price');
    if (pr) pr.textContent = '€'+st.price;
  }
});

/* ══════════════════════════════════════════
   MAIN TABS
══════════════════════════════════════════ */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
    tab.classList.add('on');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('on');
  });
});

/* ══════════════════════════════════════════
   PERIOD SUBTABS
══════════════════════════════════════════ */
document.querySelectorAll('.stab').forEach(st => {
  st.addEventListener('click', () => {
    document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.spanel').forEach(p=>p.classList.remove('on'));
    st.classList.add('on');
    const id = 'stab-'+st.dataset.stab;
    document.getElementById(id).classList.add('on');
    renderPeriodSubtab(st.dataset.stab);
  });
});

/* ══════════════════════════════════════════
   SYNC BUTTONS
══════════════════════════════════════════ */
document.getElementById('btnLoad').addEventListener('click', loadFromSheet);
document.getElementById('btnSave').addEventListener('click', saveToSheet);

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
let toastT;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 3200);
}

   INIT
══════════════════════════════════════════ */
loadLocal();

// Auto-detect current week
const _today = new Date();
for (let i = WEEKS.length-1; i >= 0; i--) {
  if (_today >= WEEK_STARTS[i]) { curWeek = i; break; }
}

renderAll();
</script>
