<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutoring Dashboard 2026 — Δρ. Καρυοφύλλης</title>
<meta name="theme-color" content="#0a0f1a">
<link rel="manifest" href="#" id="manifest-link">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;900&family=Literata:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0f1a; --surf:#111827; --surf2:#1a2235; --border:rgba(30,45,69,0.8);
  --text:#f1f5f9; --text2:#94a3b8; --text3:#64748b;
  --cyan:#06b6d4; --cyan2:#22d3ee; --blue:#3b82f6; --blue2:#60a5fa;
  --green:#10b981; --green2:#34d399; --amber:#f59e0b; --amber2:#fbbf24;
  --rose:#f43f5e; --rose2:#fb7185; --violet:#8b5cf6; --violet2:#a78bfa;
  --r:12px; --max-w:1100px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:48px}

/* HEADER */
.app-header{background:var(--surf);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-logo{display:flex;align-items:center;gap:10px}
.app-logo svg{color:var(--cyan);flex-shrink:0}
.app-logo h1{font-size:.95rem;font-weight:700;line-height:1.2}
.app-logo small{display:block;font-size:.65rem;color:var(--text3);font-weight:400}
.header-actions{display:flex;gap:8px;align-items:center}
.sync-badge{font-size:.7rem;padding:3px 10px;border-radius:20px;background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);cursor:pointer;transition:all .2s;white-space:nowrap}
.sync-badge.syncing{background:rgba(6,182,212,.15);color:var(--cyan);border-color:rgba(6,182,212,.3);animation:pulse 1s infinite}
.sync-badge.error{background:rgba(244,63,94,.15);color:var(--rose);border-color:rgba(244,63,94,.3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* STATS BAR */
.stats-bar{background:var(--surf2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:20px;overflow-x:auto}
.stat-item{display:flex;flex-direction:column;align-items:center;min-width:fit-content}
.stat-val{font-size:1.1rem;font-weight:700;color:var(--cyan);line-height:1}
.stat-lbl{font-size:.6rem;color:var(--text3);white-space:nowrap;margin-top:2px}

/* MAIN TABS */
.main-tabs{background:var(--surf);border-bottom:1px solid var(--border);display:flex;padding:0 20px;overflow-x:auto}
.tab-btn{padding:10px 18px;font-size:.82rem;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'Sora',sans-serif;white-space:nowrap}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-btn:hover:not(.active){color:var(--text2)}

/* CONTENT */
.tab-content{display:none;padding:16px 20px;max-width:var(--max-w);margin:0 auto}
.tab-content.active{display:block}

/* ============================================================
   STUDENT ACCORDION CARDS
   ============================================================ */
.student-list{display:flex;flex-direction:column;gap:6px}
.student-item{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s}
.student-item.open{border-color:rgba(6,182,212,.35)}

.student-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.student-header:hover{background:rgba(255,255,255,.02)}
.chevron{font-size:.75rem;color:var(--text3);transition:transform .25s;flex-shrink:0}
.student-item.open .chevron{transform:rotate(90deg)}

.sh-name{font-size:.9rem;font-weight:700;flex:1;min-width:0}
.sh-badges{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}
.badge{font-size:.6rem;padding:2px 6px;border-radius:8px;font-weight:600;white-space:nowrap}
.badge-G{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.25)}
.badge-B{background:rgba(139,92,246,.15);color:var(--violet);border:1px solid rgba(139,92,246,.25)}
.badge-price{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.sh-stats{display:flex;gap:8px;align-items:center;flex-shrink:0}
.sh-stat{font-size:.7rem;color:var(--text3)}
.sh-stat b{color:var(--text2)}
.sh-actions{display:flex;gap:5px;flex-shrink:0}
.btn-icon{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--surf2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .2s}
.btn-icon:hover{border-color:var(--cyan);color:var(--cyan)}

/* Status mini-dots in header */
.mini-dots{display:flex;gap:3px;align-items:center}
.mini-dot{width:7px;height:7px;border-radius:50%}
.md-pending{background:var(--amber)}
.md-done{background:var(--green)}
.md-cancelled{background:var(--rose)}
.md-rescheduled{background:var(--violet)}

/* ACCORDION BODY */
.student-body{display:none;border-top:1px solid var(--border);padding:14px}
.student-item.open .student-body{display:block}

.schedule-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.sched-pill{font-size:.7rem;padding:3px 8px;background:var(--surf2);border:1px solid var(--border);border-radius:7px;color:var(--text2)}

/* SESSION DOTS */
.weeks-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.week-row{display:flex;align-items:center;gap:8px}
.week-label{font-size:.65rem;color:var(--text3);width:48px;flex-shrink:0}
.dots-row{display:flex;gap:5px;flex-wrap:wrap}
.dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .2s}
.dot-pending{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:var(--amber)}
.dot-done{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.5);color:var(--green)}
.dot-cancelled{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.35);color:var(--rose)}
.dot-rescheduled{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.4);color:var(--violet)}
.dot:hover{transform:scale(1.1)}

.body-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border);margin-top:4px}
.note-text{font-size:.72rem;color:var(--text3);font-style:italic;flex:1}
.pay-info{font-size:.72rem;color:var(--text2)}
.pay-info b{color:var(--green)}
.pay-info span{color:var(--amber)}

/* ============================================================
   WEEK VIEW
   ============================================================ */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.week-nav h2{font-size:.95rem;font-weight:700}
.nav-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surf2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s}
.nav-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.day-column{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px}
.day-header{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.day-name{font-size:.82rem;font-weight:700;color:var(--cyan)}
.day-date{font-size:.7rem;color:var(--text3)}
.session-row{display:flex;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s}
.session-row:last-child{border-bottom:none}
.session-row:hover{background:var(--surf2)}
.session-time{font-size:.78rem;font-weight:600;color:var(--text2);min-width:42px}
.session-info{flex:1}
.session-name{font-size:.82rem;font-weight:600}
.session-detail{font-size:.68rem;color:var(--text3)}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.status-dot.pending{background:var(--amber)}
.status-dot.done{background:var(--green)}
.status-dot.cancelled{background:var(--rose)}
.status-dot.rescheduled{background:var(--violet)}
.no-sessions{padding:16px;text-align:center;color:var(--text3);font-size:.8rem}

/* ============================================================
   PERIOD VIEW
   ============================================================ */
.period-subtabs{display:flex;gap:2px;margin-bottom:14px;background:var(--surf);border-radius:var(--r);padding:4px;width:fit-content}
.subtab-btn{padding:5px 14px;border-radius:9px;font-size:.78rem;font-weight:600;border:none;background:none;color:var(--text3);cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s}
.subtab-btn.active{background:var(--surf2);color:var(--cyan)}

/* CALENDAR */
.cal-month-title{font-size:.85rem;color:var(--text2);font-weight:700;margin-bottom:8px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.cal-head{text-align:center;font-size:.62rem;color:var(--text3);font-weight:600;padding:4px 0}
.cal-cell{min-height:70px;background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:4px 5px;cursor:pointer;transition:border-color .2s}
.cal-cell:hover{border-color:rgba(6,182,212,.3)}
.cal-cell.today{border-color:var(--cyan)!important}
.cal-cell.other-month{opacity:.25;pointer-events:none}
.cal-cell.out-period{opacity:.3}
.cal-cell.has-session{background:var(--surf2)}
.cal-day{font-size:.65rem;color:var(--text3);margin-bottom:2px}
.cal-names{display:flex;flex-direction:column;gap:2px}
.cal-name{font-size:.58rem;font-weight:600;padding:1px 3px;border-radius:3px;cursor:pointer;line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-name span{font-weight:400;opacity:.8}
.cal-pending{background:rgba(245,158,11,.18);color:var(--amber2)}
.cal-done{background:rgba(16,185,129,.18);color:var(--green2)}
.cal-cancelled{background:rgba(244,63,94,.15);color:var(--rose2)}
.cal-rescheduled{background:rgba(139,92,246,.15);color:var(--violet2)}

/* TABLE */
.period-table-wrap{overflow-x:auto}
.period-table{width:100%;border-collapse:collapse;font-size:.8rem;min-width:600px}
.period-table th{padding:8px 12px;text-align:left;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);font-size:.68rem;white-space:nowrap}
.period-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.period-table tr:last-child td{border-bottom:none}
.period-table tr:hover td{background:rgba(255,255,255,.02)}
.progress-bar-wrap{background:var(--surf2);border-radius:10px;height:5px;overflow:hidden;width:70px;display:inline-block;vertical-align:middle}
.progress-bar-fill{height:100%;border-radius:10px;background:var(--cyan);transition:width .3s}
.pct-label{font-size:.65rem;color:var(--text3);margin-left:5px}

/* ============================================================
   MODALS
   ============================================================ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:16px;width:100%;max-width:420px;padding:22px;position:relative;animation:slideUp .22s ease;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:.95rem;font-weight:700;margin-bottom:14px}
.modal-close{position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--surf2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.modal-close:hover{color:var(--rose);border-color:var(--rose)}
.form-group{margin-bottom:12px}
.form-label{font-size:.72rem;color:var(--text2);margin-bottom:4px;display:block;font-weight:600}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 10px;background:var(--surf2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sora',sans-serif;font-size:.82rem;transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--cyan)}
.form-textarea{resize:vertical;min-height:70px}
.form-select option{background:var(--surf2)}
.status-buttons{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.status-btn{padding:7px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--surf2);color:var(--text2);cursor:pointer;font-size:.72rem;font-weight:600;font-family:'Sora',sans-serif;transition:all .2s;text-align:center}
.status-btn.s-pending{color:var(--amber)}.status-btn.s-pending.active{background:rgba(245,158,11,.15);border-color:var(--amber)}
.status-btn.s-done{color:var(--green)}.status-btn.s-done.active{background:rgba(16,185,129,.15);border-color:var(--green)}
.status-btn.s-cancelled{color:var(--rose)}.status-btn.s-cancelled.active{background:rgba(244,63,94,.1);border-color:var(--rose)}
.status-btn.s-rescheduled{color:var(--violet)}.status-btn.s-rescheduled.active{background:rgba(139,92,246,.12);border-color:var(--violet)}
.modal-actions{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;border:none;transition:all .2s}
.btn-primary{background:var(--cyan);color:#000}.btn-primary:hover{background:var(--cyan2)}
.btn-secondary{background:var(--surf2);color:var(--text2);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-danger{background:rgba(244,63,94,.12);color:var(--rose);border:1px solid rgba(244,63,94,.3)}.btn-danger:hover{background:rgba(244,63,94,.22)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* STATUS BAR */
.status-bar{background:var(--surf);border-top:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;justify-content:space-between;font-size:.68rem;color:var(--text3);position:fixed;bottom:0;left:0;right:0;z-index:50;flex-wrap:wrap;gap:5px}
.status-actions{display:flex;gap:5px}
.status-btn-sm{padding:3px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surf2);color:var(--text2);font-size:.68rem;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s}
.status-btn-sm:hover{border-color:var(--cyan);color:var(--cyan)}

/* TOAST */
.toast{position:fixed;top:65px;right:16px;padding:9px 14px;border-radius:9px;font-size:.78rem;font-weight:600;z-index:2000;animation:toastIn .25s ease;pointer-events:none;max-width:240px}
@keyframes toastIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-success{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.5);color:var(--green2)}
.toast-error{background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.4);color:var(--rose2)}
.toast-info{background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.4);color:var(--cyan2)}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--surf2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MISC */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surf2);border-radius:3px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:.82rem;font-weight:700;color:var(--text2)}

@media(max-width:600px){
  .sh-stats{display:none}
  .two-col{grid-template-columns:1fr}
  .stats-bar{gap:14px}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div style="color:var(--text3);font-size:.82rem">Φόρτωση…</div>
</div>

<!-- HEADER -->
<header class="app-header">
  <div class="app-logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <h1>Tutoring 2026 <small>Δρ. Δημοσθένης Καρυοφύλλης</small></h1>
  </div>
  <div class="header-actions">
    <span class="sync-badge" id="syncBadge" onclick="syncNow()">● Sync</span>
    <button class="btn-icon" onclick="openAddStudentModal()" title="Νέος μαθητής" style="width:30px;height:30px">＋</button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-item"><span class="stat-val" id="stat-active">0</span><span class="stat-lbl">Ενεργοί</span></div>
  <div class="stat-item"><span class="stat-val" id="stat-total">0</span><span class="stat-lbl">Συνεδρίες</span></div>
  <div class="stat-item"><span class="stat-val" id="stat-done" style="color:var(--green)">0</span><span class="stat-lbl">Έγιναν</span></div>
  <div class="stat-item"><span class="stat-val" id="stat-pending" style="color:var(--amber)">0</span><span class="stat-lbl">Εκκρεμείς</span></div>
  <div class="stat-item"><span class="stat-val" id="stat-income" style="color:var(--green)">€0</span><span class="stat-lbl">Πληρώθηκαν</span></div>
  <div class="stat-item"><span class="stat-val" id="stat-unpaid" style="color:var(--amber)">€0</span><span class="stat-lbl">Υπόλοιπο</span></div>
  <div class="stat-item"><span class="stat-val" id="stat-next" style="color:var(--cyan);font-size:.75rem">–</span><span class="stat-lbl">Επόμενο</span></div>
</div>

<!-- TABS -->
<nav class="main-tabs">
  <button class="tab-btn active" onclick="switchTab('students')">👥 Μαθητές</button>
  <button class="tab-btn" onclick="switchTab('week')">📅 Εβδομάδα</button>
  <button class="tab-btn" onclick="switchTab('period')">📊 Περίοδος</button>
</nav>

<!-- TAB: STUDENTS -->
<div class="tab-content active" id="tab-students">
  <div class="student-list" id="studentList"></div>
</div>

<!-- TAB: WEEK -->
<div class="tab-content" id="tab-week">
  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
    <h2 id="weekTitle">–</h2>
    <button class="nav-btn" onclick="changeWeek(1)">›</button>
  </div>
  <div id="weekContent"></div>
</div>

<!-- TAB: PERIOD -->
<div class="tab-content" id="tab-period">
  <div class="period-subtabs">
    <button class="subtab-btn active" onclick="switchSubtab('calendar')">📅 Ημερολόγιο</button>
    <button class="subtab-btn" onclick="switchSubtab('table')">📋 Πίνακας</button>
  </div>
  <div id="subtab-calendar"></div>
  <div id="subtab-table" style="display:none"></div>
</div>

<!-- SESSION MODAL -->
<div class="modal-overlay" id="sessionModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('sessionModal')">✕</button>
    <div class="modal-title" id="sessionModalTitle">Συνεδρία</div>
    <div class="form-group">
      <label class="form-label">Ημερομηνία</label>
      <input class="form-input" type="date" id="sess-date">
    </div>
    <div class="form-group">
      <label class="form-label">Ώρα</label>
      <input class="form-input" type="time" id="sess-time">
    </div>
    <div class="form-group">
      <label class="form-label">Κατάσταση</label>
      <div class="status-buttons">
        <button class="status-btn s-pending" onclick="setStatus('pending')">⏳ Εκκρεμεί</button>
        <button class="status-btn s-done" onclick="setStatus('done')">✅ Έγινε</button>
        <button class="status-btn s-cancelled" onclick="setStatus('cancelled')">❌ Ακυρώθηκε</button>
        <button class="status-btn s-rescheduled" onclick="setStatus('rescheduled')">🔄 Μεταφέρθηκε</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Σημείωση</label>
      <textarea class="form-textarea" id="sess-note" placeholder="Σημειώσεις για τη συνεδρία…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveSession()">💾 Αποθήκευση</button>
      <button class="btn btn-secondary" onclick="closeModal('sessionModal')">Άκυρο</button>
      <button class="btn btn-danger" id="deleteSessionBtn" onclick="deleteSession()" style="margin-left:auto">🗑 Διαγραφή</button>
    </div>
  </div>
</div>

<!-- STUDENT MODAL -->
<div class="modal-overlay" id="studentModal">

<script>
// ============================================================
// CONFIG & CONSTANTS
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzEddDJQl-OkQMy46TygOH8EPHEHqDotTRgZdMzsWKIUu5o4nPwnZBhaoKjeq3DAoXU/exec';

// Period: 15/6/2026 (Mon) → 17/7/2026 (Fri) — 5 weeks
// IMPORTANT: All date comparisons use YYYY-MM-DD strings to avoid UTC/timezone bugs
// Week 1: 15–21 Jun | Week 2: 22–28 Jun | Week 3: 29Jun–5Jul
// Week 4:  6–12 Jul | Week 5: 13–19 Jul
const WEEK_STARTS_STR = ['2026-06-15','2026-06-22','2026-06-29','2026-07-06','2026-07-13'];
const WEEK_ENDS_STR   = ['2026-06-21','2026-06-28','2026-07-05','2026-07-12','2026-07-19'];
const PERIOD_START_STR = '2026-06-15';
const PERIOD_END_STR   = '2026-07-18';
// Keep Date objects only for calendar rendering (not for comparisons)
const WEEK_STARTS = WEEK_STARTS_STR.map(s => new Date(s + 'T12:00:00'));
const PERIOD_START = new Date(PERIOD_START_STR + 'T12:00:00');
const PERIOD_END   = new Date(PERIOD_END_STR   + 'T12:00:00');

const DAYS_FULL  = ['Δευτέρα','Τρίτη','Τετάρτη','Πέμπτη','Παρασκευή'];
const STATUS_LABELS = {pending:'Εκκρεμεί',done:'Έγινε',cancelled:'Ακυρώθηκε',rescheduled:'Μεταφέρθηκε'};
const STATUS_COLORS = {pending:'amber',done:'green',cancelled:'rose',rescheduled:'violet'};

// ============================================================
// STATE
// ============================================================
let students = [];
let sessions = [];
let currentWeekOffset = 0; // index into WEEK_STARTS
let currentTab = 'students';
let currentSubtab = 'calendar';
let syncStatus = 'idle';
let editingSessionId = null;
let newSessionStudentId = null;
let editingStudentId = null;

// ============================================================
// INITIAL DATA
// ============================================================
const INITIAL_STUDENTS = [
  {id:'s1', name:'Ελπίδα',    cls:'Γ΄', day1:'Δευ', time1:'17:00', day2:'Παρ', time2:'17:00', price:70,  paid:0, notes:''},
  {id:'s2', name:'Γιώργος',   cls:'Γ΄', day1:'Τρί', time1:'18:00', day2:'Παρ', time2:'18:00', price:70,  paid:0, notes:''},
  {id:'s3', name:'Δέσποινα',  cls:'Γ΄', day1:'Τρί', time1:'17:00', day2:'Πέμ', time2:'17:00', price:80,  paid:0, notes:''},
  {id:'s4', name:'Χριστίνα',  cls:'Γ΄', day1:'Τετ', time1:'17:00', day2:'Παρ', time2:'18:00', price:60,  paid:0, notes:''},
  {id:'s5', name:'Νότα',      cls:'Γ΄', day1:'Πέμ', time1:'18:00', day2:'Δευ', time2:'18:00', price:80,  paid:0, notes:''},
  {id:'s6', name:'Νάντια',    cls:'Γ΄', day1:'Δευ', time1:'19:00', day2:'Τετ', time2:'18:00', price:80,  paid:0, notes:''},
  {id:'s7', name:'Ιουλιέττα', cls:'Γ΄', day1:'Τρί', time1:'18:00', day2:'Τετ', time2:'19:00', price:80,  paid:0, notes:''},
  {id:'s8', name:'Ευφημία',   cls:'Β΄', day1:'Δευ', time1:'16:00', day2:'Τετ', time2:'16:00', price:60,  paid:0, notes:'3 δίωρα Ιούνιο'},
  {id:'s9', name:'Βασιλική',  cls:'Β΄', day1:'Τρί', time1:'17:00', day2:'Πέμ', time2:'17:00', price:70,  paid:0, notes:'Ξεκινά Σεπτέμβριο'},
  {id:'s10',name:'Σταματίνα', cls:'Β΄', day1:'Τετ', time1:'18:00', day2:'Παρ', time2:'18:00', price:80,  paid:0, notes:'Ξεκινά Σεπτέμβριο'},
  {id:'s11',name:'Εβελίνα',   cls:'Β΄', day1:'Τρί', time1:'19:00', day2:'Πέμ', time2:'19:00', price:100, paid:0, notes:'Ξεκινά Σεπτέμβριο'},
];

// ============================================================
// DATE HELPERS
// ============================================================
function fmtDate(d) {
  // YYYY-MM-DD using LOCAL date parts (not toISOString which is UTC and shifts in UTC+3)
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}
function fmtDateGR(d) { return `${d.getDate()}/${d.getMonth()+1}`; }

// Get which week number (1-5) a date belongs to. Returns 0 if outside period.
// Uses STRING comparison to avoid UTC/timezone bugs (Greece UTC+3)
function getWeekNum(dateStr) {
  for (let i = 0; i < WEEK_STARTS_STR.length; i++) {
    if (dateStr >= WEEK_STARTS_STR[i] && dateStr <= WEEK_ENDS_STR[i]) return i + 1;
  }
  return 0;
}

// Build all session dates for a student within the period
// dayN: string '0'-'4' (0=Mon…4=Fri). JS: Mon=1, Tue=2, …, Fri=5
// Uses string comparison for period bounds to avoid UTC/timezone bugs
function buildSessionDates(student, limit) {
  // Μετατροπή ονόματος ημέρας → JS getDay() (0=Κυρ,1=Δευ,...,5=Παρ)
  const DAY_TO_DOW = {'Δευ':1,'Τρί':2,'Τετ':3,'Πέμ':4,'Παρ':5};
  const slots = [];
  if (student.day1) slots.push({jsDow: DAY_TO_DOW[student.day1], time: student.time1});
  if (student.day2) slots.push({jsDow: DAY_TO_DOW[student.day2], time: student.time2});

  const results = [];
  // Start from period start, iterate day by day using local date arithmetic
  // Use noon (T12:00:00) to avoid DST/timezone midnight issues
  let d = new Date(PERIOD_START_STR + 'T12:00:00');
  const endD = new Date(PERIOD_END_STR + 'T12:00:00');
  while (d <= endD) {
    const dow = d.getDay(); // local getDay(), not UTC
    const ds = fmtDate(d);  // local date string
    slots.forEach(slot => {
      if (dow === slot.jsDow) {
        results.push({date: ds, time: slot.time});
      }
    });
    d.setDate(d.getDate()+1);
  }
  results.sort((a,b) => a.date.localeCompare(b.date));
  return results.slice(0, limit);
}

function generateSessions(student, numSessions) {
  const dates = buildSessionDates(student, numSessions);
  return dates.map((sd, i) => ({
    id: `${student.id}_sess_${i+1}`,
    studentId: student.id,
    studentName: student.name,
    cls: student.cls,
    weekNum: getWeekNum(sd.date),
    sessNum: i+1,
    date: sd.date,
    time: sd.time,
    status: 'pending',
    note: '',
    price: student.price,
    paid: 0,
    updatedAt: ''
  }));
}

// ============================================================
// INIT
// ============================================================
async function init() {
  // Set current week to today's week
  // Find current week using string comparison (timezone-safe)
  const todayInit = fmtDate(new Date());
  currentWeekOffset = WEEK_STARTS_STR.length - 1; // default to last week
  for (let i = 0; i < WEEK_STARTS_STR.length; i++) {
    if (todayInit <= WEEK_ENDS_STR[i]) { currentWeekOffset = i; break; }
  }

  const saved = localStorage.getItem('tutoring_data_v6');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      students = data.students || [];
      sessions = data.sessions || [];
      // Self-heal: recompute weekNum for any session that has 0 or undefined
      sessions.forEach(s => {
        if (!s.weekNum && s.date) s.weekNum = getWeekNum(s.date);
      });
      hideLoading(); render();
      document.getElementById('statusText').textContent = 'Φορτώθηκε από localStorage · πάτα Sync για ενημέρωση';
      return;
    } catch(e) {}
  }

  // First time: generate from initial data
  students = JSON.parse(JSON.stringify(INITIAL_STUDENTS));
  sessions = [];
  students.forEach(s => {
    let num = 0;
    if (s.cls === 'Γ΄') num = 10;
    else if (s.id === 's8') num = 3; // Ευφημία: 3 δίωρα
    if (num > 0) sessions.push(...generateSessions(s, num));
  });
  saveLocal();
  hideLoading(); render();
  // First time: δεδομένα έτοιμα — πάτα Sync για να ανεβούν στο Sheet
  setSyncStatus('idle');
  document.getElementById('statusText').textContent = 'Νέα εγκατάσταση · πάτα Sync για αποθήκευση στο Sheet';
}

function hideLoading() { document.getElementById('loadingOverlay').style.display='none'; }

// ============================================================
// RENDER
// ============================================================
function render() {
  updateStats();
  if (currentTab === 'students') renderStudents();
  else if (currentTab === 'week') renderWeek();
  else if (currentTab === 'period') renderPeriod();
}

function getStudentSessions(sid) {
  return sessions.filter(s => s.studentId === sid).sort((a,b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    return a.time.localeCompare(b.time);
  });
}

function updateStats() {
  const allSess = sessions;
  const active = students.filter(s => getStudentSessions(s.id).length > 0).length;
  const done = allSess.filter(s => s.status==='done').length;
  const pending = allSess.filter(s => s.status==='pending').length;
  const income = students.reduce((a,s) => a+(parseInt(s.paid)||0), 0);
  const unpaid = students.reduce((a,s) => {
    const owed = getStudentSessions(s.id).filter(x=>x.status==='done').length * (s.price||0);
    return a + Math.max(0, owed - (parseInt(s.paid)||0));
  }, 0);
  const now = new Date();
  const todayNow = fmtDate(now) + 'T' + now.toTimeString().slice(0,5);
  const nxt = sessions
    .filter(s => s.status==='pending' && (s.date+'T'+s.time) >= todayNow)
    .sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time))[0];
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-total').textContent = allSess.length;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-income').textContent = '€'+income;
  document.getElementById('stat-unpaid').textContent = '€'+unpaid;
  document.getElementById('stat-next').textContent = nxt ? `${nxt.studentName} ${nxt.time}` : '–';
}

// ============================================================
// STUDENTS TAB — ACCORDION
// ============================================================
function renderStudents() {
  const list = document.getElementById('studentList');
  const openIds = new Set([...list.querySelectorAll('.student-item.open')].map(el=>el.dataset.id));
  list.innerHTML = '';

  students.forEach(student => {
    const stuSess = getStudentSessions(student.id);
    const done = stuSess.filter(s=>s.status==='done').length;
    const pending = stuSess.filter(s=>s.status==='pending').length;
    const isOpen = openIds.has(student.id);

    // Mini status dots for header
    const miniDots = stuSess.slice(0,10).map(s =>
      `<div class="mini-dot md-${s.status}" title="${s.date} ${STATUS_LABELS[s.status]}"></div>`
    ).join('');

    const owed = done * (student.price||0);
    const unpaid = Math.max(0, owed - (parseInt(student.paid)||0));
    const clsBadge = student.cls==='Γ΄' ? 'badge-G' : 'badge-B';

    // Build dots by week
    const weeks = [...new Set(stuSess.map(s=>s.weekNum))].sort((a,b)=>a-b);
    let weeksHtml = '';
    weeks.forEach(wn => {
      const wsess = stuSess.filter(s=>s.weekNum===wn);
      const dots = wsess.map(s => sessionDotHtml(s)).join('');
      const weekLabel = wn > 0 ? `Εβδ. ${wn}` : 'Εκτός';
      weeksHtml += `<div class="week-row">
        <span class="week-label">${weekLabel}</span>
        <div class="dots-row">${dots}</div>
      </div>`;
    });
    if (!weeksHtml) weeksHtml = `<div style="font-size:.72rem;color:var(--text3);padding:4px 0">Δεν υπάρχουν συνεδρίες</div>`;

    const item = document.createElement('div');
    item.className = 'student-item' + (isOpen ? ' open' : '');
    item.dataset.id = student.id;
    item.innerHTML = `
      <div class="student-header" onclick="toggleAccordion('${student.id}')">
        <span class="chevron">▶</span>
        <span class="sh-name">${student.name}</span>
        <div class="sh-badges">
          <span class="badge ${clsBadge}">${student.cls}</span>
          <span class="badge badge-price">€${student.price}</span>
        </div>
        <div class="sh-stats">
          <span class="sh-stat"><b>${done}</b>/${stuSess.length}</span>
          ${unpaid > 0 ? `<span class="sh-stat" style="color:var(--amber)">€${unpaid}</span>` : ''}
        </div>
        <div class="mini-dots">${miniDots}</div>
        <div class="sh-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="openStudentModal('${student.id}')" title="Επεξεργασία">✏️</button>
          <button class="btn-icon" onclick="addSessionForStudent('${student.id}')" title="Νέα συνεδρία">＋</button>
        </div>
      </div>
      <div class="student-body">
        <div class="schedule-row">
          <span class="sched-pill">📅 ${student.day1} ${student.time1}</span>
          ${student.day2 ? `<span class="sched-pill">📅 ${student.day2} ${student.time2}</span>` : ''}
        </div>
        <div class="weeks-grid">${weeksHtml}</div>
        <div class="body-footer">
          <span class="note-text">${student.notes || '–'}</span>
          <span class="pay-info">
            Πλήρωσε <b>€${student.paid||0}</b>
            ${unpaid>0 ? `· <span>Εκκρεμεί €${unpaid}</span>` : ' · <span style="color:var(--green)">✓</span>'}
          </span>
        </div>
      </div>
    `;
    list.appendChild(item);
  });
}

function sessionDotHtml(sess) {
  const icons = {pending:'⏳',done:'✓',cancelled:'✕',rescheduled:'↺'};
  return `<div class="dot dot-${sess.status}" onclick="openSessionModal('${sess.id}')"
    title="${sess.date} ${sess.time} · ${STATUS_LABELS[sess.status]}">${icons[sess.status]||'?'}</div>`;
}

function toggleAccordion(sid) {
  const item = document.querySelector(`.student-item[data-id="${sid}"]`);
  if (item) item.classList.toggle('open');
}

// ============================================================
// WEEK VIEW
// ============================================================
function renderWeek() {
  const ws = WEEK_STARTS[currentWeekOffset];
  const we = new Date(ws); we.setDate(we.getDate()+4);
  document.getElementById('weekTitle').textContent =
    `Εβδομάδα ${currentWeekOffset+1}  ·  ${fmtDateGR(ws)} – ${fmtDateGR(we)}/2026`;

  const content = document.getElementById('weekContent');
  content.innerHTML = '';

  for (let di=0; di<5; di++) {
    const day = new Date(ws); day.setDate(day.getDate()+di);
    const dayStr = fmtDate(day);
    const daySess = sessions.filter(s=>s.date===dayStr).sort((a,b)=>a.time.localeCompare(b.time));

    const col = document.createElement('div');
    col.className = 'day-column';
    col.innerHTML = `<div class="day-header">
      <span class="day-name">${DAYS_FULL[di]}</span>
      <span class="day-date">${fmtDateGR(day)}/${day.getFullYear()}</span>
    </div>`;

    if (daySess.length===0) {
      col.innerHTML += `<div class="no-sessions">Δεν υπάρχουν μαθήματα</div>`;
    } else {
      daySess.forEach(sess => {
        const row = document.createElement('div');
        row.className = 'session-row';
        row.innerHTML = `
          <span class="session-time">${sess.time}</span>
          <div class="session-info">
            <div class="session-name">${sess.studentName}</div>
            <div class="session-detail">${sess.cls} Λυκείου · ${STATUS_LABELS[sess.status]}${sess.note ? ' · '+sess.note : ''}</div>
          </div>
          <div class="status-dot ${sess.status}"></div>`;
        row.onclick = ()=> openSessionModal(sess.id);
        col.appendChild(row);
      });
    }
    content.appendChild(col);
  }
}

function changeWeek(delta) {
  currentWeekOffset = Math.max(0, Math.min(WEEK_STARTS.length-1, currentWeekOffset+delta));
  renderWeek();
}

// ============================================================
// PERIOD VIEW
// ============================================================
function renderPeriod() {
  if (currentSubtab==='calendar') renderCalendar();
  else renderTable();
}

function renderCalendar() {
  const el = document.getElementById('subtab-calendar');
  let html = '';
  // June (month index 5) and July (6)
  [[5,'Ιούνιος 2026'],[6,'Ιούλιος 2026']].forEach(([month, title]) => {
    html += `<div class="cal-month-title">${title}</div>`;
    html += `<div class="calendar-grid">`;
    ['Δευ','Τρι','Τετ','Πεμ','Παρ','Σαβ','Κυρ'].forEach(d => {
      html += `<div class="cal-head">${d}</div>`;
    });
    const first = new Date(2026, month, 1, 12, 0, 0); // noon to avoid DST
    const startDow = (first.getDay()+6)%7; // 0=Mon
    for (let i=0; i<startDow; i++) html += `<div class="cal-cell other-month"></div>`;
    const daysInMonth = new Date(2026, month+1, 0).getDate();
    const now = new Date(); const todayStr = fmtDate(now);
    for (let d=1; d<=daysInMonth; d++) {
      const date = new Date(2026,month,d,12,0,0); // noon
      const ds = fmtDate(date);
      const daySess = sessions.filter(s=>s.date===ds);
      const isToday = ds===todayStr;
      const inPeriod = ds>=PERIOD_START_STR && ds<=PERIOD_END_STR; // string compare
      let cls = 'cal-cell';
      if (isToday) cls += ' today';
      if (!inPeriod) cls += ' out-period';
      if (daySess.length>0) cls += ' has-session';
      const names = daySess.map(s=>`<div class="cal-name cal-${s.status}" onclick="openSessionModal('${s.id}')">${s.studentName.split(' ')[0]} <span>${s.time}</span></div>`).join('');
      html += `<div class="${cls}"><div class="cal-day">${d}</div><div class="cal-names">${names}</div></div>`;
    }
    html += `</div>`;
  });
  el.innerHTML = html;
}

function renderTable() {
  const el = document.getElementById('subtab-table');
  let html = `<div class="period-table-wrap"><table class="period-table">
    <thead><tr>
      <th>Μαθητής</th><th>Τάξη</th><th>Σύνολο</th><th>Έγιναν</th><th>Εκκρ.</th><th>Πρόοδος</th>
      <th>Τιμή</th><th>Πλήρωσε</th><th>Υπόλοιπο</th><th>Σημειώσεις</th>
    </tr></thead><tbody>`;

  // Totals row at end
  let totTotal=0,totDone=0,totIncome=0,totUnpaid=0;
  students.forEach(s => {
    const stuSess = getStudentSessions(s.id);
    const total = stuSess.length;
    const done = stuSess.filter(x=>x.status==='done').length;
    const pend = stuSess.filter(x=>x.status==='pending').length;
    const pct = total>0 ? Math.round(done/total*100) : 0;
    const owed = done*(s.price||0);
    const unpaid = Math.max(0, owed-(parseInt(s.paid)||0));
    totTotal+=total; totDone+=done;
    totIncome+=(parseInt(s.paid)||0); totUnpaid+=unpaid;

    html += `<tr>
      <td style="font-weight:700;color:var(--text)">${s.name}</td>
      <td><span class="badge ${s.cls==='Γ΄'?'badge-G':'badge-B'}">${s.cls}</span></td>
      <td style="color:var(--text2)">${total}</td>
      <td style="color:var(--green);font-weight:600">${done}</td>
      <td style="color:var(--amber)">${pend}</td>
      <td>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span class="pct-label">${pct}%</span>
      </td>
      <td style="color:var(--cyan)">€${s.price}</td>
      <td style="color:var(--green)">€${s.paid||0}</td>
      <td style="color:${unpaid>0?'var(--amber)':'var(--green)'}; font-weight:600">${unpaid>0?'€'+unpaid:'✓'}</td>
      <td style="color:var(--text3);font-size:.7rem;font-style:italic">${s.notes||'–'}</td>
    </tr>`;
  });
  html += `<tr style="border-top:2px solid var(--border)">
    <td style="font-weight:700;color:var(--cyan)">Σύνολο</td>
    <td></td>
    <td style="font-weight:700">${totTotal}</td>
    <td style="color:var(--green);font-weight:700">${totDone}</td>
    <td style="color:var(--amber);font-weight:700">${totTotal-totDone}</td>
    <td></td>
    <td></td>
    <td style="color:var(--green);font-weight:700">€${totIncome}</td>
    <td style="color:${totUnpaid>0?'var(--amber)':'var(--green)'};font-weight:700">${totUnpaid>0?'€'+totUnpaid:'✓'}</td>
    <td></td>
  </tr>`;
  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

// ============================================================
// SESSION MODAL
// ============================================================
function openSessionModal(sessId) {
  const sess = sessions.find(s=>s.id===sessId);
  if (!sess) return;
  editingSessionId = sessId;
  newSessionStudentId = null;
  document.getElementById('sessionModalTitle').textContent = `${sess.studentName} · Συνεδρία ${sess.sessNum}`;
  document.getElementById('sess-date').value = sess.date;
  document.getElementById('sess-time').value = sess.time;
  document.getElementById('sess-note').value = sess.note||'';
  document.getElementById('deleteSessionBtn').style.display = 'block';
  setStatus(sess.status);
  document.getElementById('sessionModal').classList.add('open');
}

function addSessionForStudent(sid) {
  editingSessionId = null;
  newSessionStudentId = sid;
  const s = students.find(x=>x.id===sid);
  document.getElementById('sessionModalTitle').textContent = `${s.name} · Νέα Συνεδρία`;
  document.getElementById('sess-date').value = '';
  document.getElementById('sess-time').value = s.time1;
  document.getElementById('sess-note').value = '';
  document.getElementById('deleteSessionBtn').style.display = 'none';
  setStatus('pending');
  document.getElementById('sessionModal').classList.add('open');
}

let currentSessionStatus = 'pending';

function setStatus(status) {
  currentSessionStatus = status;
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.querySelector(`.s-${status}`);
  if (btn) btn.classList.add('active');
}

function saveSession() {
  const status = currentSessionStatus || 'pending';
  const date = document.getElementById('sess-date').value;
  const time = document.getElementById('sess-time').value;
  const note = document.getElementById('sess-note').value;
  if (!date) { showToast('Εισάγετε ημερομηνία', 'error'); return; }

  if (editingSessionId) {
    const idx = sessions.findIndex(s=>s.id===editingSessionId);
    if (idx>=0) sessions[idx] = {...sessions[idx], date, time, status, note,
      weekNum: getWeekNum(date), updatedAt: new Date().toISOString()};
  } else if (newSessionStudentId) {
    const s = students.find(x=>x.id===newSessionStudentId);
    const stuSess = getStudentSessions(newSessionStudentId);
    sessions.push({
      id:`${newSessionStudentId}_x${Date.now()}`,
      studentId:newSessionStudentId, studentName:s.name, cls:s.cls,
      weekNum:getWeekNum(date), sessNum:stuSess.length+1,
      date, time, status, note, price:s.price, paid:0,
      updatedAt: new Date().toISOString()
    });
  }
  closeModal('sessionModal');
  saveLocal(); render(); pushData();
  showToast('Αποθηκεύτηκε', 'success');
}

function deleteSession() {
  if (!editingSessionId) return;
  if (!confirm('Διαγραφή συνεδρίας;')) return;
  sessions = sessions.filter(s=>s.id!==editingSessionId);
  closeModal('sessionModal');
  saveLocal(); render();
  showToast('Διαγράφηκε', 'info');
}

  document.getElementById('edit-time2').value = s.time2||'';
  document.getElementById('edit-price').value = s.price||'';
  document.getElementById('edit-paid').value = s.paid||'';
  document.getElementById('edit-notes').value = s.notes||'';
  document.getElementById('deleteStudentBtn').style.display='block';
  document.getElementById('studentModal').classList.add('open');

function openAddStudentModal() {
  editingStudentId = 'new';
  document.getElementById('studentModalTitle').textContent = 'Νέος Μαθητής';
  ['edit-name','edit-time1','edit-time2','edit-price','edit-paid','edit-notes'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('edit-cls').value='Γ΄';
  document.getElementById('edit-day1').value='0';
  document.getElementById('edit-day2').value='';
  document.getElementById('edit-time1').value='17:00';
  document.getElementById('deleteStudentBtn').style.display='none';

function saveStudent() {
  const name  = document.getElementById('edit-name').value.trim();
  const cls   = document.getElementById('edit-cls').value;
  const day1  = document.getElementById('edit-day1').value;
  const time1 = document.getElementById('edit-time1').value;
  const day2  = document.getElementById('edit-day2').value;
  const time2 = document.getElementById('edit-time2').value;
  const price = parseInt(document.getElementById('edit-price').value)||0;
  const paid  = parseInt(document.getElementById('edit-paid').value)||0;
  const notes = document.getElementById('edit-notes').value.trim();
  if (!name) { showToast('Εισάγετε όνομα', 'error'); return; }

  if (editingStudentId==='new') {
    const id = 's'+Date.now();
    students.push({id, name, cls, day1, time1, day2, time2, price, paid, notes, updatedAt: new Date().toISOString()});
  } else {
    const idx = students.findIndex(s=>s.id===editingStudentId);
    if (idx>=0) students[idx] = {...students[idx], name, cls, day1, time1, day2, time2, price, paid, notes, updatedAt: new Date().toISOString()};
  }
  closeModal('studentModal');
  saveLocal(); render(); pushData();
  showToast('Αποθηκεύτηκε', 'success');
}

function deleteStudent() {
  if (!editingStudentId || editingStudentId==='new') return;
  if (!confirm('Διαγραφή μαθητή και όλων των συνεδριών;')) return;
  students = students.filter(s=>s.id!==editingStudentId);
  sessions = sessions.filter(s=>s.studentId!==editingStudentId);
  closeModal('studentModal');
  saveLocal(); render();
  showToast('Διαγράφηκε', 'info');
}

// ============================================================
// SYNC WITH GOOGLE SHEETS
// ============================================================
function setSyncStatus(s) {
  syncStatus = s;
  const badge = document.getElementById('syncBadge');
  badge.className = 'sync-badge' + (s==='syncing'?' syncing':s==='error'?' error':'');
  badge.textContent = s==='syncing'?'⟳ Sync…':s==='error'?'✕ Σφάλμα':'● Sync';
}

async function gasGet(params) {
  // URL-encode data param separately to avoid length issues
  const url = GAS_URL + '?' + new URLSearchParams(params).toString();
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function syncNow(silent=false) {
  if (syncStatus==='syncing') return;
  setSyncStatus('syncing');
  if (!silent) showToast('Συγχρονισμός…','info');
  try {
    // Pull everything in one call (Apps Script uses 'getAll')
    const all = await gasGet({action:'getAll'});
    console.log('GAS getAll response:', JSON.stringify(all).substring(0,300));

    if (all.students && all.students.length > 0) {
      // Sheet έχει δεδομένα → χρησιμοποίησέ τα
      students = all.students;
      if (all.sessions) sessions = all.sessions;
      saveLocal(); render();
    } else if (students.length > 0) {
      // Sheet άδειο αλλά έχουμε τοπικά δεδομένα → push στο Sheet
      console.log('Sheet empty, pushing local data...');
      await pushData();
    }
    setSyncStatus('ok');
    document.getElementById('statusText').textContent =
      'Τελευταία συγχρ.: ' + new Date().toLocaleTimeString('el-GR');
    if (!silent) showToast('Συγχρονίστηκε ✓','success');
  } catch(e) {
    console.error('Sync error:', e);
    setSyncStatus('error');
    document.getElementById('statusText').textContent = 'Offline · localStorage (' + e.message + ')';
    if (!silent) showToast('Σφάλμα: ' + e.message,'error');
  }
}

async function pushData() {
  setSyncStatus('syncing');
  try {
    // Push students (Apps Script uses 'saveStudents')
    const sr = await gasGet({action:'saveStudents', data: JSON.stringify(students)});
    console.log('Push students:', sr);
    // Push sessions in chunks of 10 (Apps Script uses 'saveSessions' + reset)
    for (let i=0; i<sessions.length; i+=10) {
      const chunk = sessions.slice(i,i+10);
      const p = {action:'saveSessions', data: JSON.stringify(chunk)};
      if (i===0) p.reset='1'; // first chunk clears sheet
      const cr = await gasGet(p);
      console.log('Push sessions chunk', i, ':', cr);
    }
    if (sessions.length===0) {
      await gasGet({action:'saveSessions', data:'[]', reset:'1'});
    }
    setSyncStatus('ok');
    document.getElementById('statusText').textContent =
      'Αποθηκεύτηκε: ' + new Date().toLocaleTimeString('el-GR');
  } catch(e) {
    console.error('Push error:', e);
    setSyncStatus('error');
    showToast('Σφάλμα αποθήκευσης: ' + e.message,'error');
  }
}

// ============================================================
// LOCAL STORAGE
// ============================================================
function saveLocal() {
  localStorage.setItem('tutoring_data_v6', JSON.stringify({students, sessions, savedAt: new Date().toISOString()}));
}

function backupData() {
  const blob = new Blob([JSON.stringify({students,sessions,savedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`tutoring_backup_${fmtDate(new Date())}.json`; a.click();
  showToast('Backup αποθηκεύτηκε','success');
}

function loadFromBackup() {
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        students = d.students||students; sessions = d.sessions||sessions;
        saveLocal(); render(); showToast('Φορτώθηκε ✓','success');
      } catch(e) { showToast('Σφάλμα αρχείου','error'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

function confirmReset() {
  if (!confirm('Επαναφορά σε αρχικά δεδομένα; Θα χαθούν όλες οι αλλαγές.')) return;
  localStorage.removeItem('tutoring_data_v6'); location.reload();
}

async function diagGAS() {
  showToast('Έλεγχος GAS…','info');
  try {
    const r1 = await gasGet({action:'getStudents'});
    const r2 = await gasGet({action:'getSessions'});
    const msg = 'Students: ' + (r1.success ? (r1.students||[]).length + ' εγγραφές' : 'ΣΦΑΛΜΑ: ' + JSON.stringify(r1))
              + '\nSessions: ' + (r2.success ? (r2.sessions||[]).length + ' εγγραφές' : 'ΣΦΑΛΜΑ: ' + JSON.stringify(r2));
    alert('GAS Diagnostic\n\n' + msg);
  } catch(e) {
    alert('Σφάλμα σύνδεσης:\n' + e.message);
  }
}

// ============================================================

// ============================================================
function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}
