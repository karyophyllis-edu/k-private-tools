<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ιδιαίτερα 2026 — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;900&family=Literata:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0f1a;--surf:#111827;--surf2:#1a2235;--border:rgba(30,45,69,0.8);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --cyan:#06b6d4;--cyan2:#22d3ee;--blue:#3b82f6;--blue2:#60a5fa;
  --green:#10b981;--green2:#34d399;--amber:#f59e0b;--amber2:#fbbf24;
  --rose:#f43f5e;--rose2:#fb7185;--violet:#8b5cf6;--violet2:#a78bfa;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
/* HEADER */
header{background:var(--surf);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-weight:700;font-size:15px;color:var(--cyan)}
.logo span{color:var(--text2);font-weight:400;font-size:12px;margin-left:8px}
.sync-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sync-status{font-size:11px;color:var(--text3);padding:4px 8px;background:var(--surf2);border-radius:6px;border:1px solid var(--border)}
.sync-status.ok{color:var(--green);border-color:rgba(16,185,129,.3)}
.sync-status.err{color:var(--rose);border-color:rgba(244,63,94,.3)}
.sync-status.loading{color:var(--amber);border-color:rgba(245,158,11,.3)}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surf);padding:0 20px}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab:hover:not(.active){color:var(--text2)}
/* MAIN */
main{padding:16px 20px;max-width:1200px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}
/* SECTION TITLE */
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;transition:all .2s}
.btn-cyan{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
.btn-cyan:hover{background:rgba(6,182,212,.25)}
.btn-green{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.btn-green:hover{background:rgba(16,185,129,.25)}
.btn-amber{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.btn-rose{background:rgba(244,63,94,.12);color:var(--rose);border:1px solid rgba(244,63,94,.3)}
.btn-sm{padding:5px 10px;font-size:11px}
/* STATS BAR */
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.stat-box{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;flex:1;min-width:90px}
.stat-box-val{font-size:20px;font-weight:700;color:var(--cyan)}
.stat-box-label{font-size:10px;color:var(--text3);margin-top:1px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
/* STUDENT LIST */
.student-list{display:flex;flex-direction:column;gap:7px}
.student-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s}
.student-card:hover{border-color:rgba(6,182,212,.25)}
.student-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.student-idx{width:22px;height:22px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0}
.student-name{font-weight:700;font-size:14px;min-width:90px}
.student-cls{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;flex-shrink:0}
.cls-g{background:rgba(6,182,212,.15);color:var(--cyan)}
.cls-b{background:rgba(139,92,246,.15);color:var(--violet)}
.student-days{font-size:11px;color:var(--text3);flex:1}
.student-price{font-size:12px;font-weight:700;color:var(--green);min-width:36px;text-align:right}
.student-progress{font-size:11px;color:var(--text3);min-width:38px;text-align:right}
.chevron{font-size:9px;color:var(--text3);transition:transform .2s;margin-left:6px}
.student-card.open .chevron{transform:rotate(180deg)}
.student-body{display:none;border-top:1px solid var(--border)}
.student-card.open .student-body{display:block}
/* STUDENT FORM */
.student-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group.full{grid-column:1/-1}
label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
input,select,textarea{background:var(--surf2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 9px;font-family:'Sora',sans-serif;font-size:12px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:rgba(6,182,212,.5)}
select option{background:var(--surf2)}
/* STUDENT SESSIONS LIST */
.student-sessions{padding:10px 14px 12px}
.stu-sess-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stu-sess-weeks{display:flex;flex-direction:column;gap:6px}
.stu-week-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stu-week-label{font-size:10px;color:var(--text3);min-width:50px;font-weight:600}
.stu-sess-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.stu-sess-chip:hover{filter:brightness(1.2)}
.chip-scheduled{background:rgba(6,182,212,.1);color:var(--cyan);border-color:rgba(6,182,212,.25)}
.chip-completed{background:rgba(16,185,129,.12);color:var(--green);border-color:rgba(16,185,129,.25)}
.chip-absent{background:rgba(244,63,94,.1);color:var(--rose);border-color:rgba(244,63,94,.25)}
.chip-cancelled{background:rgba(100,116,139,.1);color:var(--text3);border-color:rgba(100,116,139,.2)}
/* WEEK VIEW */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.week-nav-btn{background:var(--surf2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;transition:all .2s}
.week-nav-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.week-label{font-size:14px;font-weight:700;flex:1;text-align:center}
.day-columns{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.day-col{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.day-header{padding:8px 10px;background:var(--surf2);font-size:11px;font-weight:700;color:var(--text2);text-align:center;border-bottom:1px solid var(--border)}
.day-col.today-col .day-header{color:var(--cyan);border-bottom-color:rgba(6,182,212,.4)}
.session-slot{padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.session-slot:last-child{border-bottom:none}
.session-slot:hover{background:var(--surf2)}
.session-time{font-size:10px;color:var(--text3);margin-bottom:2px}
.session-name{font-size:12px;font-weight:600}
.session-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700;margin-top:2px}
.status-scheduled{background:rgba(6,182,212,.15);color:var(--cyan)}
.status-completed{background:rgba(16,185,129,.15);color:var(--green)}
.status-absent{background:rgba(244,63,94,.12);color:var(--rose)}
.status-cancelled{background:rgba(100,116,139,.15);color:var(--text3)}
/* PERIOD TAB SUBTABS */
.subtabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.subtab{padding:8px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s}
.subtab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.subtab:hover:not(.active){color:var(--text2)}
/* PERIOD CARDS */
.period-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.period-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.period-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.period-name{font-weight:700;font-size:13px}
.period-stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.stat-pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.sessions-progress{background:var(--surf2);border-radius:4px;height:5px;overflow:hidden;margin-bottom:5px}
.sessions-bar{height:100%;background:var(--cyan);border-radius:4px;transition:width .4s}
.sessions-label{font-size:10px;color:var(--text3)}
/* SUMMARY TABLE */
.summary-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
.summary-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--surf2)}
.summary-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.summary-table tr:last-child td{border-bottom:none}
.summary-table tbody tr:hover{background:var(--surf2)}
.summary-table tfoot td{font-weight:700;color:var(--text);border-top:2px solid var(--border);background:var(--surf2)}
/* CALENDAR */
.cal-months{display:flex;flex-direction:column;gap:24px}
.cal-month-title{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-header{text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:4px 0;text-transform:uppercase}
.cal-cell{background:var(--surf);border:1px solid var(--border);border-radius:8px;min-height:72px;padding:4px;position:relative}
.cal-cell.today{border-color:rgba(6,182,212,.5)}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell.weekend{opacity:.4}
.cal-date{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:3px}
.cal-cell.today .cal-date{color:var(--cyan)}
.cal-event{font-size:9px;padding:1px 5px;border-radius:4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
/* SESSION MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-form{display:flex;flex-direction:column;gap:9px}
.modal-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:11px 15px;font-size:12px;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;max-width:300px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:rgba(16,185,129,.4);color:var(--green)}
.toast.err{border-color:rgba(244,63,94,.4);color:var(--rose)}
@media(max-width:700px){
  .day-columns{grid-template-columns:1fr 1fr}
  .student-form{grid-template-columns:1fr}
  .stats-bar{gap:6px}
  .cal-grid{grid-template-columns:repeat(7,1fr)}
  .cal-event{font-size:8px}
}
</style>
</head>
<body>

<header>
  <div class="logo">📚 Ιδιαίτερα 2026 <span>15/6 – 18/7 · 5 εβδομάδες</span></div>
  <div class="sync-bar">
    <span class="sync-status" id="syncStatus">⬤ Τοπικά δεδομένα</span>
    <button class="btn btn-cyan btn-sm" id="btnLoad">⬇ Φόρτωση από Sheet</button>
    <button class="btn btn-green btn-sm" id="btnSave">⬆ Αποθήκευση στο Sheet</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="students">👤 Μαθητές</div>
  <div class="tab" data-tab="week">📅 Εβδομάδα</div>
  <div class="tab" data-tab="period">📊 Περίοδος</div>
</div>

<main>

<!-- ===== TAB: ΜΑΘΗΤΕΣ ===== -->
<div class="tab-panel active" id="tab-students">
  <div class="stats-bar" id="statsBar"></div>
  <div class="section-title">Μαθητές</div>
  <div class="student-list" id="studentList"></div>
</div>

<!-- ===== TAB: ΕΒΔΟΜΑΔΑ ===== -->
<div class="tab-panel" id="tab-week">
  <div class="week-nav">
    <button class="week-nav-btn" id="weekPrev">←</button>
    <div class="week-label" id="weekLabel"></div>
    <button class="week-nav-btn" id="weekNext">→</button>
  </div>
  <div class="day-columns" id="dayColumns"></div>
</div>

<!-- ===== TAB: ΠΕΡΙΟΔΟΣ ===== -->
<div class="tab-panel" id="tab-period">
  <div class="stats-bar" id="periodStats"></div>
  <div class="subtabs">
    <div class="subtab active" data-subtab="summary">📋 Πίνακας</div>
    <div class="subtab" data-subtab="cards">🃏 Κάρτες</div>
    <div class="subtab" data-subtab="calendar">🗓 Ημερολόγιο</div>
  </div>
  <div id="period-summary" class="subtab-panel"></div>
  <div id="period-cards" class="subtab-panel" style="display:none"></div>
  <div id="period-calendar" class="subtab-panel" style="display:none"></div>
</div>

</main>

<!-- SESSION MODAL -->
<div class="modal-overlay hidden" id="sessionModal">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Συνεδρία</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-form" id="modalForm"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzEddDJQl-OkQMy46TygOH8EPHEHqDotTRgZdMzsWKIUu5o4nPwnZBhaoKjeq3DAoXU/exec';
const DAYS = ['Δευ','Τρί','Τετ','Πέμ','Παρ'];
const DAY_NAMES_SHORT = {Δευ:'Δευτ.',Τρί:'Τρίτη',Τετ:'Τετ.',Πέμ:'Πέμπτη',Παρ:'Παρ.'};
const DAY_NAMES_FULL = {Δευ:'Δευτέρα',Τρί:'Τρίτη',Τετ:'Τετάρτη',Πέμ:'Πέμπτη',Παρ:'Παρασκευή'};
const STATUS_LABELS = {scheduled:'Προγρ.',completed:'Έγινε',absent:'Απών',cancelled:'Ακυρ.'};
const STATUS_ICONS  = {scheduled:'📅',completed:'✅',absent:'❌',cancelled:'🚫'};

const WEEKS = [
  {num:1,start:'2026-06-15',label:'Εβδ. 1 — 15–21 Ιουν.'},
  {num:2,start:'2026-06-22',label:'Εβδ. 2 — 22–28 Ιουν.'},
  {num:3,start:'2026-06-29',label:'Εβδ. 3 — 29 Ιουν.–5 Ιουλ.'},
  {num:4,start:'2026-07-06',label:'Εβδ. 4 — 6–12 Ιουλ.'},
  {num:5,start:'2026-07-13',label:'Εβδ. 5 — 13–19 Ιουλ.'},
];
// Parse date strings as LOCAL dates (avoid UTC timezone shift)
function parseLocalDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
const WEEK_STARTS = WEEKS.map(w => parseLocalDate(w.start));
const DAY_OFFSETS = {Δευ:0,Τρί:1,Τετ:2,Πέμ:3,Παρ:4};

// Calendar event colors per student (cycling)
const STUDENT_COLORS = [
  {bg:'rgba(6,182,212,.18)',c:'#22d3ee'},
  {bg:'rgba(59,130,246,.18)',c:'#60a5fa'},
  {bg:'rgba(16,185,129,.18)',c:'#34d399'},
  {bg:'rgba(245,158,11,.18)',c:'#fbbf24'},
  {bg:'rgba(244,63,94,.18)',c:'#fb7185'},
  {bg:'rgba(139,92,246,.18)',c:'#a78bfa'},
  {bg:'rgba(236,72,153,.18)',c:'#f472b6'},
  {bg:'rgba(20,184,166,.18)',c:'#2dd4bf'},
  {bg:'rgba(234,179,8,.18)',c:'#facc15'},
  {bg:'rgba(249,115,22,.18)',c:'#fb923c'},
  {bg:'rgba(100,116,139,.18)',c:'#94a3b8'},
];

// ============================================================
// DEFAULT DATA
// ============================================================
const DEFAULT_STUDENTS = [
  {id:'s1', name:'Ελπίδα',    cls:'Γ΄', day1:'Τρί', time1:'09:00', day2:'Πέμ', time2:'09:00', price:70,  paid:0, notes:'', updatedAt:''},
  {id:'s2', name:'Γιώργος',   cls:'Γ΄', day1:'Τρί', time1:'14:00', day2:'Παρ', time2:'13:00', price:70,  paid:0, notes:'', updatedAt:''},
  {id:'s3', name:'Δέσποινα',  cls:'Γ΄', day1:'Τρί', time1:'09:30', day2:'Πέμ', time2:'09:00', price:80,  paid:0, notes:'', updatedAt:''},
  {id:'s4', name:'Χριστίνα',  cls:'Γ΄', day1:'Τετ', time1:'09:00', day2:'Παρ', time2:'11:00', price:60,  paid:0, notes:'', updatedAt:''},
  {id:'s5', name:'Νότα',      cls:'Γ΄', day1:'Δευ', time1:'14:00', day2:'Πέμ', time2:'14:00', price:80,  paid:0, notes:'', updatedAt:''},
  {id:'s6', name:'Νάντια',    cls:'Γ΄', day1:'Δευ', time1:'09:00', day2:'Τετ', time2:'11:00', price:80,  paid:0, notes:'', updatedAt:''},
  {id:'s7', name:'Ιουλιέττα', cls:'Γ΄', day1:'Δευ', time1:'11:00', day2:'Τετ', time2:'14:00', price:80,  paid:0, notes:'', updatedAt:''},
  {id:'s8', name:'Ευφημία',   cls:'Β΄', day1:'Δευ', time1:'16:00', day2:'Τετ', time2:'16:00', price:60,  paid:0, notes:'3 sessions', updatedAt:''},
  {id:'s9', name:'Βασιλική',  cls:'Β΄', day1:'Τρί', time1:'17:00', day2:'Πέμ', time2:'17:00', price:70,  paid:0, notes:'Ξεκινά Σεπτ.', updatedAt:''},
  {id:'s10',name:'Σταματίνα', cls:'Β΄', day1:'Τετ', time1:'18:00', day2:'Παρ', time2:'18:00', price:80,  paid:0, notes:'Ξεκινά Σεπτ.', updatedAt:''},
  {id:'s11',name:'Εβελίνα',   cls:'Β΄', day1:'Τρί', time1:'19:00', day2:'Πέμ', time2:'19:00', price:100, paid:0, notes:'Ξεκινά Σεπτ.', updatedAt:''},
];

function generateDefaultSessions() {
  const sessions = [];
  let counter = 1;
  DEFAULT_STUDENTS.forEach(st => {
    const numWeeks = (st.id === 's8') ? 3 : (st.cls === 'Γ΄') ? 5 : 0;
    const numDays  = (st.id === 's8') ? 1 : 2;
    for (let w = 1; w <= numWeeks; w++) {
      const ws = WEEK_STARTS[w-1];
      [[st.day1, st.time1],[st.day2, st.time2]].slice(0, numDays).forEach(([day, time]) => {
        if (!day) return;
        const d = new Date(ws);
        d.setDate(d.getDate() + DAY_OFFSETS[day]);
        sessions.push({
          id: `sess${counter++}`,
          studentId: st.id, studentName: st.name, cls: st.cls,
          weekNum: w, date: dateStr(d), time,
          status: 'scheduled', note: '', price: st.price, paid: 0, updatedAt: ''
        });
      });
    }
  });
  return sessions;
}

function dateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

// ============================================================
// STATE
// ============================================================
let state = {
  students: JSON.parse(JSON.stringify(DEFAULT_STUDENTS)),
  sessions: generateDefaultSessions(),
};
let currentWeekIdx = 0;
let currentPeriodSubtab = 'summary';

function loadLocal() {
  try {
    const s = localStorage.getItem('tutoring2026v3');
    if (s) { const p = JSON.parse(s); if (p.students) state.students = p.students; if (p.sessions) state.sessions = p.sessions; }
  } catch(e) {}
}
function saveLocal() {
  try { localStorage.setItem('tutoring2026v3', JSON.stringify(state)); } catch(e) {}
}

// ============================================================
// SYNC
// ============================================================
async function loadFromSheet() {
  setSyncStatus('loading','⟳ Φόρτωση…');
  try {
    const res = await fetch(GAS_URL + '?action=getAll');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.students?.length) state.students = mergeByTs(state.students, data.students, 'id');
    if (data.sessions?.length) state.sessions = mergeByTs(state.sessions, data.sessions, 'id');
    saveLocal(); setSyncStatus('ok','✓ Φορτώθηκε ' + timeNow()); renderAll();
    toast('Δεδομένα φορτώθηκαν', 'ok');
  } catch(e) { setSyncStatus('err','✗ Σφάλμα'); toast('Σφάλμα: ' + e.message, 'err'); }
}

async function saveToSheet() {
  setSyncStatus('loading','⟳ Αποθήκευση…');
  const now = new Date().toISOString();
  state.students.forEach(s => { if (!s.updatedAt) s.updatedAt = now; });
  state.sessions.forEach(s => { if (!s.updatedAt) s.updatedAt = now; });
  saveLocal();
  try {
    const r1 = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:'saveStudents', students: state.students})});
    const d1 = await r1.json(); if (d1.status !== 'ok') throw new Error(d1.message);
    const r2 = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:'saveSessions', sessions: state.sessions})});
    const d2 = await r2.json(); if (d2.status !== 'ok') throw new Error(d2.message);
    setSyncStatus('ok','✓ Αποθηκεύτηκε ' + timeNow()); toast('Αποθηκεύτηκε στο Sheet', 'ok');
  } catch(e) { setSyncStatus('err','✗ Σφάλμα'); toast('Σφάλμα: ' + e.message, 'err'); }
}

function mergeByTs(local, remote, key) {
  const map = {};
  local.forEach(i => map[i[key]] = i);
  remote.forEach(i => {
    const ex = map[i[key]];
    if (!ex || new Date(i.updatedAt||0) > new Date(ex.updatedAt||0)) map[i[key]] = i;
  });
  return Object.values(map);
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  renderStats();
  renderStudentList();
  renderWeek();
  renderPeriodStats();
  renderPeriodSubtab(currentPeriodSubtab);
}

// ============================================================
// STATS BAR
// ============================================================
function renderStats() {
  const total = state.sessions.length;
  const done = state.sessions.filter(s=>s.status==='completed').length;
  const totalRev = state.sessions.filter(s=>s.status==='completed').reduce((a,s)=>a+(+s.price||0),0);
  const totalPaid = state.students.reduce((a,s)=>a+(+s.paid||0),0);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-box"><div class="stat-box-val">${state.students.length}</div><div class="stat-box-label">Μαθητές</div></div>
    <div class="stat-box"><div class="stat-box-val">${done}/${total}</div><div class="stat-box-label">Sessions</div></div>
    <div class="stat-box"><div class="stat-box-val" style="color:var(--green)">€${totalRev}</div><div class="stat-box-label">Ολοκληρώθηκαν</div></div>
    <div class="stat-box"><div class="stat-box-val" style="color:var(--amber)">€${totalPaid}</div><div class="stat-box-label">Εισπράχθηκαν</div></div>
  `;
}

// ============================================================
// STUDENT LIST — with full sessions breakdown
// ============================================================
function renderStudentList() {
  const el = document.getElementById('studentList');
  el.innerHTML = state.students.map((st, si) => {
    const stSess = state.sessions.filter(s=>s.studentId===st.id).sort((a,b)=>a.date.localeCompare(b.date));
    const total = stSess.length;
    const done = stSess.filter(s=>s.status==='completed').length;

    // Group sessions by week
    const byWeek = {};
    stSess.forEach(s => {
      const wk = s.weekNum || weekNumFor(s.date);
      if (!byWeek[wk]) byWeek[wk] = [];
      byWeek[wk].push(s);
    });

    const weekRows = Object.keys(byWeek).sort((a,b)=>a-b).map(wk => {
      const chips = byWeek[wk].map(sess => `
        <span class="stu-sess-chip chip-${sess.status}" onclick="openSessionModal('${sess.id}')">
          ${fmtDateShort(sess.date)} ${sess.time} <span style="opacity:.7">${STATUS_ICONS[sess.status]}</span>
        </span>`).join('');
      return `<div class="stu-week-row"><span class="stu-week-label">Εβδ.${wk}</span>${chips}</div>`;
    }).join('');

    const sessBody = total > 0 ? `
      <div class="student-sessions">
        <div class="stu-sess-title">Sessions (${done}/${total})</div>
        <div class="stu-sess-weeks">${weekRows}</div>
      </div>` : '';

    return `
    <div class="student-card" id="sc-${st.id}">
      <div class="student-header" onclick="toggleStudent('${st.id}')">
        <div class="student-idx">${si+1}</div>
        <div class="student-name">${st.name}</div>
        <span class="student-cls ${st.cls==='Γ΄'?'cls-g':'cls-b'}">${st.cls}</span>
        <div class="student-days">${st.day1} ${st.time1}${st.day2?' · '+st.day2+' '+st.time2:''}</div>
        <div class="student-price">€${st.price}</div>
        <div class="student-progress">${done}/${total}</div>
        <span class="chevron">▼</span>
      </div>
      <div class="student-body">
        <div class="student-form">
          <div class="form-group"><label>Ημέρα 1</label>
            <select onchange="updateStudent('${st.id}','day1',this.value)">${DAYS.map(d=>`<option${st.day1===d?' selected':''}>${d}</option>`).join('')}</select></div>
          <div class="form-group"><label>Ώρα 1</label>
            <input type="time" value="${st.time1}" onchange="updateStudent('${st.id}','time1',this.value)"></div>
          <div class="form-group"><label>Ημέρα 2</label>
            <select onchange="updateStudent('${st.id}','day2',this.value)"><option value="">—</option>${DAYS.map(d=>`<option${st.day2===d?' selected':''}>${d}</option>`).join('')}</select></div>
          <div class="form-group"><label>Ώρα 2</label>
            <input type="time" value="${st.time2||''}" onchange="updateStudent('${st.id}','time2',this.value)"></div>
          <div class="form-group"><label>Τιμή €/session</label>
            <input type="number" value="${st.price}" onchange="updateStudent('${st.id}','price',parseInt(this.value)||0)"></div>
          <div class="form-group"><label>Πληρωμένα €</label>
            <input type="number" value="${st.paid||0}" onchange="updateStudent('${st.id}','paid',parseInt(this.value)||0)"></div>
          <div class="form-group full"><label>Σημειώσεις</label>
            <textarea rows="2" onchange="updateStudent('${st.id}','notes',this.value)">${st.notes||''}</textarea></div>
        </div>
        ${sessBody}
      </div>
    </div>`;
  }).join('');
}

function toggleStudent(id) {
  document.getElementById('sc-'+id).classList.toggle('open');
}
function updateStudent(id, field, value) {
  const st = state.students.find(s=>s.id===id);
  if (!st) return;
  st[field] = value; st.updatedAt = new Date().toISOString();
  saveLocal(); renderStats();
}

function weekNumFor(dateStr) {
  for (let i = WEEKS.length-1; i >= 0; i--) {
    if (dateStr >= WEEKS[i].start) return WEEKS[i].num;
  }
  return 1;
}

// ============================================================
// WEEK VIEW
// ============================================================
function renderWeek() {
  document.getElementById('weekLabel').textContent = WEEKS[currentWeekIdx].label;
  const ws = WEEK_STARTS[currentWeekIdx];
  const todayD = new Date(); const today = dateStr(todayD);
  document.getElementById('dayColumns').innerHTML = DAYS.map((day, di) => {
    const d = new Date(ws); d.setDate(d.getDate() + di);
    const dStr = dateStr(d);
    const isToday = dStr === today;
    const daySess = state.sessions.filter(s=>s.date===dStr).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const slots = daySess.map(sess => `
      <div class="session-slot" onclick="openSessionModal('${sess.id}')">
        <div class="session-time">${sess.time||'—'}</div>
        <div class="session-name">${sess.studentName}</div>
        <span class="session-badge status-${sess.status}">${STATUS_LABELS[sess.status]}</span>
      </div>`).join('') || `<div style="padding:10px;font-size:11px;color:var(--text3);text-align:center">—</div>`;
    return `<div class="day-col${isToday?' today-col':''}">
      <div class="day-header">${DAY_NAMES_FULL[day]}<br><span style="font-weight:400;color:var(--text3)">${fmtDate(d)}</span></div>
      ${slots}</div>`;
  }).join('');
}
document.getElementById('weekPrev').onclick = () => { if (currentWeekIdx>0){currentWeekIdx--;renderWeek();}};
document.getElementById('weekNext').onclick = () => { if (currentWeekIdx<WEEKS.length-1){currentWeekIdx++;renderWeek();}};

// CALENDAR
function renderCalendar() {
  const el = document.getElementById('period-calendar');

  // Build color map per student
  const colorMap = {};
  state.students.forEach((st, i) => { colorMap[st.id] = STUDENT_COLORS[i % STUDENT_COLORS.length]; });

  // Build sessions map by date
  const sessMap = {};
  state.sessions.forEach(sess => {
    if (!sessMap[sess.date]) sessMap[sess.date] = [];
    sessMap[sess.date].push(sess);
  });

  // Months to show: June + July 2026
  const months = [
    {year:2026, month:5, name:'Ιούνιος 2026'},
    {year:2026, month:6, name:'Ιούλιος 2026'},
  ];

  const calDayHeaders = ['Δευ','Τρί','Τετ','Πέμ','Παρ','Σάβ','Κυρ'].map(d=>
    `<div class="cal-day-header">${d}</div>`).join('');

  const todayD = new Date(); const today = dateStr(todayD);

  const monthsHtml = months.map(({year, month, name}) => {
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month+1, 0);
    // JS: 0=Sun, need Mon=0
    let startDow = firstDay.getDay(); // 0=Sun
    startDow = (startDow + 6) % 7;   // Mon=0

    let cells = '';
    // Empty cells before first
    for (let i=0;i<startDow;i++) cells += '<div class="cal-cell empty"></div>';

    for (let day=1; day<=lastDay.getDate(); day++) {
      const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dow = new Date(year,month,day).getDay(); // 0=Sun
      const isWeekend = dow===0||dow===6;
      const isToday = dStr===today;
      const events = (sessMap[dStr]||[]).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
      const eventHtml = events.map(sess => {
        const col = colorMap[sess.studentId]||{bg:'rgba(100,116,139,.2)',c:'#94a3b8'};
        const sico = sess.status==='completed'?'✓':sess.status==='absent'?'✗':sess.status==='cancelled'?'✕':'';
        return `<div class="cal-event" style="background:${col.bg};color:${col.c}" onclick="openSessionModal('${sess.id}')" title="${sess.studentName} ${sess.time}">${sico?sico+' ':''}${sess.studentName} ${sess.time}</div>`;
      }).join('');
      cells += `<div class="cal-cell${isToday?' today':''}${isWeekend?' weekend':''}">
        <div class="cal-date">${day}</div>${eventHtml}</div>`;
    }

    return `<div>
      <div class="cal-month-title">${name}</div>
      <div class="cal-grid">${calDayHeaders}${cells}</div>
    </div>`;
  }).join('');

  // Legend
  const legend = state.students.map((st,i)=>{
    const col = STUDENT_COLORS[i%STUDENT_COLORS.length];
    return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:${col.c}">
      <span style="width:10px;height:10px;border-radius:3px;background:${col.bg};border:1px solid ${col.c};display:inline-block"></span>
      ${st.name}</span>`;
  }).join('');

  el.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;padding:10px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r)">${legend}</div>
    <div class="cal-months">${monthsHtml}</div>`;
}

let editingSessionId = null;

function openSessionModal(id) {
  const sess = state.sessions.find(s=>s.id===id);
  if (!sess) return;
  editingSessionId = id;
  document.getElementById('modalTitle').textContent = `${sess.studentName} — ${fmtDateFull(sess.date)} ${sess.time}`;
  document.getElementById('modalForm').innerHTML = `
    <div class="form-group"><label>Κατάσταση</label>
      <select id="mStatus">
        <option value="scheduled"${sess.status==='scheduled'?' selected':''}>📅 Προγραμματισμένη</option>
        <option value="completed"${sess.status==='completed'?' selected':''}>✅ Έγινε</option>
        <option value="absent"${sess.status==='absent'?' selected':''}>❌ Απών/ούσα</option>
        <option value="cancelled"${sess.status==='cancelled'?' selected':''}>🚫 Ακυρώθηκε</option>
      </select></div>
    <div class="form-group"><label>Ημερομηνία (αν μεταφερθεί)</label>
      <input type="date" id="mDate" value="${sess.date}"></div>
    <div class="form-group"><label>Ώρα</label>
      <input type="time" id="mTime" value="${sess.time||''}"></div>
    <div class="form-group"><label>Τιμή €</label>
      <input type="number" id="mPrice" value="${sess.price||0}"></div>
    <div class="form-group"><label>Σημείωση</label>
      <textarea id="mNote" rows="2">${sess.note||''}</textarea></div>`;
  document.getElementById('modalActions').innerHTML = `
    <button class="btn btn-green" onclick="saveSession()">💾 Αποθήκευση</button>
    <button class="btn btn-rose btn-sm" onclick="closeModal()">Ακύρωση</button>`;
  document.getElementById('sessionModal').classList.remove('hidden');
}

function saveSession() {
  const sess = state.sessions.find(s=>s.id===editingSessionId);
  if (!sess) return;
  sess.status = document.getElementById('mStatus').value;
  sess.date   = document.getElementById('mDate').value;
  sess.time   = document.getElementById('mTime').value;
  sess.price  = parseInt(document.getElementById('mPrice').value)||0;
  sess.note   = document.getElementById('mNote').value;
  sess.weekNum = weekNumFor(sess.date);
  sess.updatedAt = new Date().toISOString();
  saveLocal(); closeModal(); renderAll();
  toast('Session ενημερώθηκε','ok');
}

function closeModal() {
  document.getElementById('sessionModal').classList.add('hidden');
  editingSessionId = null;
}
document.getElementById('sessionModal').addEventListener('click', e => {
  if (e.target===document.getElementById('sessionModal')) closeModal();
});

// ============================================================
// UTILS
// ============================================================
function setSyncStatus(type, msg) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + type; el.textContent = msg;
}
function timeNow() { return new Date().toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(d) { return d.toLocaleDateString('el-GR',{day:'numeric',month:'short'}); }
function fmtDateShort(dStr) {
  if(!dStr) return '';
  const d = new Date(dStr+'T00:00:00');
  return d.toLocaleDateString('el-GR',{day:'numeric',month:'short'});
}
function fmtDateFull(dStr) {
  if(!dStr) return '';
  const d = new Date(dStr+'T00:00:00');
  return d.toLocaleDateString('el-GR',{weekday:'short',day:'numeric',month:'short'});
}
let toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>el.classList.remove('show'), 3500);
}

loadLocal();
// Auto-detect current week
const today2 = new Date();
for (let i=WEEKS.length-1;i>=0;i--) {
  if (today2 >= WEEK_STARTS[i]) { currentWeekIdx = i; break; }
}
