<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ιδιαίτερα Μαθήματα — Δρ. Δ. Καρυοφύλλης</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;900&family=Literata:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1a;
  --surf:#111827;
  --surf2:#1a2235;
  --border:rgba(30,45,69,0.8);
  --text:#f1f5f9;
  --text2:#94a3b8;
  --text3:#64748b;
  --cyan:#06b6d4;
  --cyan2:#22d3ee;
  --blue:#3b82f6;
  --blue2:#60a5fa;
  --green:#10b981;
  --green2:#34d399;
  --amber:#f59e0b;
  --amber2:#fbbf24;
  --rose:#f43f5e;
  --rose2:#fb7185;
  --violet:#8b5cf6;
  --violet2:#a78bfa;
  --r:12px;
  --max-w:860px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;padding-bottom:80px}

/* HEADER */
.app-header{padding:1.25rem 1rem .75rem;border-bottom:1px solid var(--border);background:var(--surf);position:sticky;top:0;z-index:50}
.app-header-inner{max-width:var(--max-w);margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo-block .logo-name{font-size:15px;font-weight:700;color:var(--text)}
.logo-block .logo-sub{font-size:11px;color:var(--cyan);margin-top:1px}
.period-pill{font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(6,182,212,.12);color:var(--cyan);border:1px solid rgba(6,182,212,.25)}

/* MAIN NAV TABS */
.main-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surf);position:sticky;top:57px;z-index:40;overflow-x:auto}
.main-tabs::-webkit-scrollbar{display:none}
.main-tab{flex:1;min-width:90px;padding:.65rem .5rem;font-size:12px;font-weight:600;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:.15s;white-space:nowrap;text-align:center}
.main-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}

/* CONTENT SECTIONS */
.tab-section{display:none;max-width:var(--max-w);margin:0 auto;padding:1rem}
.tab-section.active{display:block}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:24px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.stat-card.accent-cyan .stat-value{color:var(--cyan)}
.stat-card.accent-green .stat-value{color:var(--green)}
.stat-card.accent-amber .stat-value{color:var(--amber)}
.stat-card.accent-rose .stat-value{color:var(--rose)}

/* SECTION DIVIDER */
.sect-divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0 .75rem}
.sect-divider-line{flex:1;height:1px;background:var(--border)}
.sect-divider-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}

/* CLASS FILTER */
.class-filter{display:flex;gap:6px;margin-bottom:.9rem}
.cf-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:.12s}
.cf-btn.active{background:rgba(6,182,212,.15);color:var(--cyan);border-color:rgba(6,182,212,.4)}

/* STUDENT CARD */
.student-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);margin-bottom:.6rem;overflow:hidden;transition:border-color .15s}
.student-card:hover{border-color:rgba(6,182,212,.3)}
.sc-top{display:flex;align-items:center;gap:10px;padding:.9rem 1rem;cursor:pointer}
.sc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-g{background:rgba(139,92,246,.2);color:var(--violet2)}
.av-b{background:rgba(16,185,129,.2);color:var(--green2)}
.sc-info{flex:1;min-width:0}
.sc-name{font-size:15px;font-weight:600;color:var(--text)}
.sc-meta{font-size:11px;color:var(--text3);margin-top:2px}
.sc-right{text-align:right;flex-shrink:0}
.sc-hours{font-size:17px;font-weight:700;color:var(--cyan)}
.sc-hlabel{font-size:10px;color:var(--text3)}
.sc-chevron{font-size:16px;color:var(--text3);margin-left:8px;transition:transform .2s}
.sc-chevron.open{transform:rotate(180deg)}

/* CARD BODY */
.sc-body{display:none;padding:0 1rem 1rem;border-top:1px solid var(--border)}
.sc-body.open{display:block}

/* SESSION DOTS */
.sessions-legend{display:flex;gap:8px;flex-wrap:wrap;margin:.75rem 0 .5rem}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.sessions-weeks{margin-bottom:.85rem}
.week-row{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.week-lbl{font-size:10px;color:var(--text3);width:46px;flex-shrink:0}
.sess-dot{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;transition:.12s;border:1px solid transparent;flex-shrink:0}
.s-done{background:rgba(16,185,129,.2);color:var(--green2);border-color:rgba(16,185,129,.3)}
.s-cancel{background:rgba(244,63,94,.15);color:var(--rose2);border-color:rgba(244,63,94,.25)}
.s-transfer{background:rgba(245,158,11,.15);color:var(--amber2);border-color:rgba(245,158,11,.25)}
.s-pending{background:var(--surf2);color:var(--text3);border-color:var(--border)}
.sess-dot:hover{transform:scale(1.08)}

/* PAYMENT */
.pay-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.pay-bar{height:5px;border-radius:3px;background:var(--surf2);margin-bottom:.75rem}
.pay-fill{height:5px;border-radius:3px;background:var(--green);transition:width .4s}
.balance-ok{color:var(--green2)}
.balance-due{color:var(--rose2)}
.balance-adv{color:var(--amber2)}

/* NOTES */
.notes-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.notes-ta{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sora',sans-serif;font-size:12px;padding:8px 10px;resize:none;min-height:52px}
.notes-ta:focus{outline:none;border-color:rgba(6,182,212,.4)}

/* ACTION ROW */
.action-row{display:flex;gap:8px;margin-top:.75rem}
.act-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Sora',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.12s}
.act-btn:hover{background:var(--surf2);color:var(--text)}
.act-btn.primary{border-color:rgba(6,182,212,.35);color:var(--cyan)}
.act-btn.primary:hover{background:rgba(6,182,212,.1)}

/* ADD STUDENT BTN */
.add-student-btn{display:flex;align-items:center;gap:8px;width:100%;padding:.85rem 1rem;border:1px dashed var(--border);border-radius:var(--r);background:transparent;color:var(--text3);font-size:13px;font-family:'Sora',sans-serif;cursor:pointer;margin-top:.25rem;transition:.12s}
.add-student-btn:hover{border-color:rgba(6,182,212,.4);color:var(--cyan)}

/* ═══════════════════════════════
   WEEKLY VIEW
═══════════════════════════════ */
.week-nav{display:flex;align-items:center;justify-content:space-between;background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:.75rem 1rem;margin-bottom:1rem}
.week-nav-title{font-size:14px;font-weight:600;color:var(--cyan)}
.week-nav-sub{font-size:11px;color:var(--text3);margin-top:1px}
.wnav-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:5px 12px;cursor:pointer;font-size:16px;transition:.12s}
.wnav-btn:hover{border-color:var(--cyan);color:var(--cyan)}

.day-block{margin-bottom:.75rem}
.day-header{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:.4rem .1rem;display:flex;align-items:center;gap:8px}
.day-header .day-date{font-size:11px;color:var(--text3);font-weight:400}
.day-empty{font-size:12px;color:var(--text3);padding:.5rem .25rem;font-style:italic}
.lesson-card{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s}
.lesson-card:hover{border-color:rgba(6,182,212,.35)}
.lc-time{font-size:13px;font-weight:700;color:var(--cyan);min-width:46px}
.lc-info{flex:1}
.lc-name{font-size:14px;font-weight:600;color:var(--text)}
.lc-meta{font-size:11px;color:var(--text3);margin-top:1px}
.lc-status{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.ls-done{background:rgba(16,185,129,.15);color:var(--green2)}
.ls-cancel{background:rgba(244,63,94,.12);color:var(--rose2)}
.ls-transfer{background:rgba(245,158,11,.12);color:var(--amber2)}
.ls-pending{background:var(--surf2);color:var(--text3)}

/* ═══════════════════════════════
   PERIOD VIEW — TABS
═══════════════════════════════ */
.period-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem}
.period-tab{padding:.55rem 1rem;font-size:12px;font-weight:600;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:.12s}
.period-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}

/* Calendar grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:1rem}
.cal-head{font-size:10px;font-weight:600;color:var(--text3);text-align:center;padding:.3rem 0;text-transform:uppercase}
.cal-day{background:var(--surf);border-radius:6px;min-height:52px;padding:3px;position:relative;border:1px solid var(--border)}
.cal-day.inactive{background:transparent;border-color:transparent}
.cal-day.today{border-color:rgba(6,182,212,.5)}
.cal-day-num{font-size:10px;color:var(--text3);margin-bottom:2px}
.cal-day.today .cal-day-num{color:var(--cyan);font-weight:700}
.cal-lesson-pill{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cp-done{background:rgba(16,185,129,.2);color:var(--green2)}
.cp-cancel{background:rgba(244,63,94,.15);color:var(--rose2)}
.cp-transfer{background:rgba(245,158,11,.15);color:var(--amber2)}
.cp-pending{background:var(--surf2);color:var(--text3)}

/* Period table view */
.period-table{width:100%;border-collapse:collapse;font-size:12px}
.period-table th{background:var(--surf2);color:var(--text3);padding:.5rem .6rem;text-align:left;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.period-table td{padding:.55rem .6rem;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text)}
.period-table tr:hover td{background:rgba(255,255,255,.02)}
.pt-name{font-weight:600;font-size:13px}
.pt-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600}
.pt-g{background:rgba(139,92,246,.2);color:var(--violet2)}
.pt-b{background:rgba(16,185,129,.18);color:var(--green2)}
.pt-sessions{display:flex;gap:3px;flex-wrap:wrap}
.pt-dot{width:18px;height:18px;border-radius:4px;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* ═══════════════════════════════
   MODALS
═══════════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:1.35rem;width:100%;max-width:360px}
.modal h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:1rem}
.modal label{display:block;font-size:12px;color:var(--text3);margin-bottom:3px;margin-top:.75rem}
.modal label:first-of-type{margin-top:0}
.modal input,.modal select,.modal textarea{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sora',sans-serif;font-size:13px;padding:8px 10px}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:rgba(6,182,212,.5)}
.modal select option{background:var(--surf)}
.modal-btns{display:flex;gap:8px;margin-top:1.1rem}
.mbtn{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Sora',sans-serif;cursor:pointer;transition:.12s}
.mbtn-cancel{background:transparent;border:1px solid var(--border);color:var(--text2)}
.mbtn-ok{background:rgba(6,182,212,.18);border:1px solid rgba(6,182,212,.4);color:var(--cyan)}
.mbtn-ok:hover{background:rgba(6,182,212,.28)}
.mbtn-cancel:hover{background:var(--surf2)}

/* Legend bar */
.legend-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;padding:.6rem .8rem;background:var(--surf);border-radius:8px;border:1px solid var(--border)}
.leg2{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg2-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:.6rem 1.2rem;font-size:12px;color:var(--text);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <div class="logo-block">
      <div class="logo-name">Δρ. Δ. Καρυοφύλλης</div>
      <div class="logo-sub">karyophyllis.com · Ιδιαίτερα 2026–27</div>
    </div>
    <span class="period-pill">15/6 – 18/7 · 5 εβδ.</span>
  </div>
</header>

<nav class="main-tabs">
  <button class="main-tab active" onclick="showTab('students',this)">Μαθητές</button>
  <button class="main-tab" onclick="showTab('weekly',this)">Εβδομάδα</button>
  <button class="main-tab" onclick="showTab('period',this)">Περίοδος</button>
</nav>

<!-- ═══════ TAB: ΜΑΘΗΤΕΣ ═══════ -->
<section class="tab-section active" id="tab-students">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="class-filter">
    <button class="cf-btn active" onclick="setFilter('all',this)">Όλοι</button>
    <button class="cf-btn" onclick="setFilter('G',this)">Γ΄ Λυκείου</button>
    <button class="cf-btn" onclick="setFilter('B',this)">Β΄ Λυκείου</button>
  </div>
  <div id="studentList"></div>
  <button class="add-student-btn" onclick="openModal('addModal')">
    ＋ Προσθήκη μαθητή
  </button>
</section>

<!-- ═══════ TAB: ΕΒΔΟΜΑΔΑ ═══════ -->
<section class="tab-section" id="tab-weekly">
  <div class="week-nav">
    <button class="wnav-btn" onclick="changeWeek(-1)">‹</button>
    <div style="text-align:center">
      <div class="week-nav-title" id="weekTitle"></div>
      <div class="week-nav-sub" id="weekSub"></div>
    </div>
    <button class="wnav-btn" onclick="changeWeek(1)">›</button>
  </div>
  <div class="legend-bar">
    <span class="leg2"><span class="leg2-dot" style="background:rgba(16,185,129,.3)"></span>Έγινε</span>
    <span class="leg2"><span class="leg2-dot" style="background:rgba(244,63,94,.25)"></span>Ακυρώθηκε</span>
    <span class="leg2"><span class="leg2-dot" style="background:rgba(245,158,11,.25)"></span>Μεταφέρθηκε</span>
    <span class="leg2"><span class="leg2-dot" style="background:var(--surf2)"></span>Εκκρεμεί</span>
  </div>
  <div id="weeklyView"></div>
</section>

<!-- ═══════ TAB: ΠΕΡΙΟΔΟΣ ═══════ -->
<section class="tab-section" id="tab-period">
  <div class="period-tabs">
    <button class="period-tab active" onclick="setPeriodTab('calendar',this)">Ημερολόγιο</button>
    <button class="period-tab" onclick="setPeriodTab('table',this)">Πίνακας</button>
  </div>
  <div id="periodCalendar"></div>
  <div id="periodTable" style="display:none"></div>
</section>

<!-- ═══════ MODALS ═══════ -->
<div class="modal-bg" id="sessionModal">
  <div class="modal">
    <h3 id="sessModalTitle">Μάθημα</h3>
    <label style="color:var(--cyan)">📅 Ημερομηνία μαθήματος</label>
    <input type="date" id="sess-date">
    <label style="color:var(--cyan)">🕐 Ώρα έναρξης</label>
    <input type="time" id="sess-time">
    <label>Κατάσταση</label>
    <select id="sess-status">
      <option value="pending">Εκκρεμεί</option>
      <option value="done">Έγινε ✓</option>
      <option value="cancel">Ακυρώθηκε ✕</option>
      <option value="transfer">Μεταφέρθηκε →</option>
    </select>
    <label>Σημείωση</label>
    <textarea id="sess-note" rows="2" placeholder="π.χ. μεταφέρθηκε Παρ 27/6 στις 18:00"></textarea>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('sessionModal')">Άκυρο</button>
      <button class="mbtn mbtn-ok" onclick="saveSession()">Αποθήκευση</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="addModal">
  <div class="modal">
    <h3>Νέος μαθητής</h3>
    <label>Όνομα</label>
    <input type="text" id="new-name" placeholder="Όνομα">
    <label>Τάξη</label>
    <select id="new-class">
      <option value="G">Γ΄ Λυκείου</option>
      <option value="B">Β΄ Λυκείου</option>
    </select>
    <label>Ημέρα 1 (π.χ. Δευτ)</label>
    <select id="new-day1">
      <option value="0">Δευτέρα</option>
      <option value="1">Τρίτη</option>
      <option value="2">Τετάρτη</option>
      <option value="3">Πέμπτη</option>
      <option value="4">Παρασκευή</option>
    </select>
    <label>Ώρα 1</label>
    <input type="time" id="new-time1" value="17:00">
    <label>Ημέρα 2</label>
    <select id="new-day2">
      <option value="0">Δευτέρα</option>
      <option value="1">Τρίτη</option>
      <option value="2">Τετάρτη</option>
      <option value="3">Πέμπτη</option>
      <option value="4" selected>Παρασκευή</option>
    </select>
    <label>Ώρα 2</label>
    <input type="time" id="new-time2" value="17:00">
    <label>Τιμή ανά δίωρο (€)</label>
    <input type="number" id="new-price" value="40" min="0">
    <label>Σύνολο μαθημάτων</label>
    <input type="number" id="new-total" value="10" min="1">
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('addModal')">Άκυρο</button>
      <button class="mbtn mbtn-ok" onclick="addStudent()">Προσθήκη</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>Επεξεργασία</h3>
    <label>Όνομα</label>
    <input type="text" id="edit-name">
    <label>Ημέρα 1</label>
    <select id="edit-day1">
      <option value="0">Δευτέρα</option><option value="1">Τρίτη</option>
      <option value="2">Τετάρτη</option><option value="3">Πέμπτη</option>
      <option value="4">Παρασκευή</option>
    </select>
    <label>Ώρα 1</label>
    <input type="time" id="edit-time1">
    <label>Ημέρα 2</label>
    <select id="edit-day2">
      <option value="0">Δευτέρα</option><option value="1">Τρίτη</option>
      <option value="2">Τετάρτη</option><option value="3">Πέμπτη</option>
      <option value="4">Παρασκευή</option>
    </select>
    <label>Ώρα 2</label>
    <input type="time" id="edit-time2">
    <label>Τιμή/δίωρο (€)</label>
    <input type="number" id="edit-price" min="0">
    <label>Πληρωμένα (€)</label>
    <input type="number" id="edit-paid" min="0">
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('editModal')">Άκυρο</button>
      <button class="mbtn mbtn-ok" onclick="saveEdit()">Αποθήκευση</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ────────────────────────────────────────────────────────────
const PERIOD_START = new Date(2026, 5, 15); // 15 June 2026
const TOTAL_WEEKS = 5;
const DAY_NAMES = ['Δευτέρα','Τρίτη','Τετάρτη','Πέμπτη','Παρασκευή','Σάββατο','Κυριακή'];
const DAY_SHORT = ['Δευτ','Τρίτ','Τετ','Πέμπ','Παρ','Σάβ','Κυρ'];
const MONTH_GR = ['Ιανουαρίου','Φεβρουαρίου','Μαρτίου','Απριλίου','Μαΐου','Ιουνίου','Ιουλίου','Αυγούστου','Σεπτεμβρίου','Οκτωβρίου','Νοεμβρίου','Δεκεμβρίου'];
const MONTH_SHORT = ['Ιαν','Φεβ','Μαρ','Απρ','Μαΐ','Ιούν','Ιούλ','Αύγ','Σεπτ','Οκτ','Νοε','Δεκ'];

let nextId = 12;
let editingStudentId = null;
let editingSessionIdx = null;
let currentFilter = 'all';
let currentWeek = 1;
let currentPeriodTab = 'calendar';

// Build session list from scheduled days
function buildSessions(day1, time1, day2, time2, totalSessions) {
  const sessions = [];
  const dates = [];
  let d = new Date(PERIOD_START);
  // find all weekdays 0=Mon..4=Fri for totalSessions
  while (dates.length < totalSessions) {
    const wd = d.getDay(); // 0=Sun,1=Mon..
    const monBased = wd === 0 ? 6 : wd - 1; // 0=Mon..6=Sun
    if (monBased === parseInt(day1) || monBased === parseInt(day2)) {
      dates.push({date: new Date(d), day: monBased, time: monBased === parseInt(day1) ? time1 : time2});
    }
    d.setDate(d.getDate() + 1);
  }
  dates.forEach((dt, i) => {
    sessions.push({
      status: 'pending',
      date: fmtDate(dt.date),
      time: dt.time,
      note: '',
      weekNum: Math.floor(i/2)+1,
      sessNum: i%2+1
    });
  });
  return sessions;
}

function fmtDate(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function parseDateStr(s) {
  if (!s) return null;
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function displayDate(s) {
  const d = parseDateStr(s);
  if (!d) return '';
  return d.getDate()+' '+MONTH_SHORT[d.getMonth()];
}

let students = [
  {id:1,name:'Ελπίδα',cls:'G',day1:0,time1:'17:00',day2:4,time2:'17:00',price:70,paid:0,notes:''},
  {id:2,name:'Γιώργος',cls:'G',day1:1,time1:'18:00',day2:4,time2:'18:00',price:70,paid:0,notes:''},
  {id:3,name:'Δέσποινα',cls:'G',day1:1,time1:'17:00',day2:3,time2:'17:00',price:80,paid:0,notes:''},
  {id:4,name:'Χριστίνα',cls:'G',day1:2,time1:'17:00',day2:4,time2:'18:00',price:60,paid:0,notes:''},
  {id:5,name:'Νότα',cls:'G',day1:3,time1:'18:00',day2:0,time2:'18:00',price:80,paid:0,notes:''},
  {id:6,name:'Νάντια',cls:'G',day1:0,time1:'19:00',day2:2,time2:'18:00',price:80,paid:0,notes:''},
  {id:7,name:'Ιουλιέττα',cls:'G',day1:1,time1:'18:00',day2:2,time2:'19:00',price:80,paid:0,notes:''},
  {id:8,name:'Ευφημία',cls:'B',day1:0,time1:'16:00',day2:2,time2:'16:00',price:60,paid:0,notes:'3 δίωρα Ιούνιο'},
  {id:9,name:'Βασιλική',cls:'B',day1:1,time1:'17:00',day2:3,time2:'17:00',price:70,paid:0,notes:'Ξεκινά Σεπτέμβριο'},
  {id:10,name:'Σταματίνα',cls:'B',day1:2,time1:'18:00',day2:4,time2:'18:00',price:80,paid:0,notes:'Ξεκινά Σεπτέμβριο'},
  {id:11,name:'Εβελίνα',cls:'B',day1:1,time1:'19:00',day2:3,time2:'19:00',price:100,paid:0,notes:'Ξεκινά Σεπτέμβριο'}
];

// initialize sessions
students.forEach(s => {
  const total = s.cls === 'G' ? 10 : (s.name === 'Ευφημία' ? 3 : 0);
  s.sessions = total > 0 ? buildSessions(s.day1, s.time1, s.day2, s.time2, total) : [];
});

// ── UTILITIES ───────────────────────────────────────────────────────
function initials(n){ return n.slice(0,2).toUpperCase(); }
function statusClass(st){ return {done:'s-done',cancel:'s-cancel',transfer:'s-transfer',pending:'s-pending'}[st]||'s-pending'; }
function statusLabel(st){ return {done:'Έγινε',cancel:'Ακυρώθηκε',transfer:'Μεταφέρθηκε',pending:'Εκκρεμεί'}[st]||''; }
function lessonStatusClass(st){ return {done:'ls-done',cancel:'ls-cancel',transfer:'ls-transfer',pending:'ls-pending'}[st]||'ls-pending'; }
function calPillClass(st){ return {done:'cp-done',cancel:'cp-cancel',transfer:'cp-transfer',pending:'cp-pending'}[st]||'cp-pending'; }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function weekDateRange(wNum) {
  const start = new Date(PERIOD_START);
  start.setDate(start.getDate() + (wNum-1)*7);
  const end = new Date(start);
  end.setDate(end.getDate()+4);
  return {start, end};
}

// ── MAIN TAB ────────────────────────────────────────────────────────
function showTab(tab, btn) {
  document.querySelectorAll('.tab-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  if (tab==='weekly') renderWeekly();
  if (tab==='period') renderPeriod();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.cf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderStudents();
}

// ── RENDER STATS ────────────────────────────────────────────────────
function renderStats() {
  const activeSt = students.filter(s=>s.sessions.length>0);
  const totalH = students.reduce((a,s)=>a+s.sessions.filter(x=>x.status==='done').length*2,0);
  const owed = students.reduce((a,s)=>a+s.sessions.filter(x=>x.status==='done').length*s.price,0);
  const paid = students.reduce((a,s)=>a+s.paid,0);
  const pending = students.reduce((a,s)=>a+s.sessions.filter(x=>x.status==='pending').length,0);
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card accent-cyan">
      <div class="stat-label">Ενεργοί μαθητές</div>
      <div class="stat-value">${activeSt.length}</div>
      <div class="stat-sub">${students.length} συνολικά</div>
    </div>
    <div class="stat-card accent-green">
      <div class="stat-label">Ώρες</div>
      <div class="stat-value">${totalH}</div>
      <div class="stat-sub">${totalH/2} δίωρα εκτελεσμένα</div>
    </div>
    <div class="stat-card accent-rose">
      <div class="stat-label">Υπόλοιπο</div>
      <div class="stat-value">€${owed-paid}</div>
      <div class="stat-sub">πληρωμένα €${paid}</div>
    </div>
    <div class="stat-card accent-amber">
      <div class="stat-label">Επόμενα μαθήματα</div>
      <div class="stat-value">${pending}</div>
      <div class="stat-sub">προγραμματισμένα</div>
    </div>
  `;
}

// ── RENDER STUDENTS ──────────────────────────────────────────────────
function renderStudents() {
  const list = document.getElementById('studentList');
  const filt = currentFilter==='all' ? students : students.filter(s=>s.cls===currentFilter);
  const gSt = filt.filter(s=>s.cls==='G');
  const bSt = filt.filter(s=>s.cls==='B');
  let html = '';

  if (gSt.length) {
    if (currentFilter==='all') html += divider('Γ΄ Λυκείου — Πανελλαδικές 2027');
    gSt.forEach(s=>html+=studentCard(s));
  }
  if (bSt.length) {
    if (currentFilter==='all') html += divider('Β΄ Λυκείου — Σεπτέμβριος 2026');
    bSt.forEach(s=>html+=studentCard(s));
  }
  list.innerHTML = html;
}

function divider(label) {
  return `<div class="sect-divider"><div class="sect-divider-line"></div><span class="sect-divider-label">${label}</span><div class="sect-divider-line"></div></div>`;
}

function studentCard(s) {
  const done = s.sessions.filter(x=>x.status==='done').length;
  const total = s.sessions.length;
  const owed = done * s.price;
  const balance = owed - s.paid;
  const payPct = owed>0 ? Math.min(100, Math.round(s.paid/owed*100)) : 0;
  const dayName1 = DAY_SHORT[parseInt(s.day1)];
  const dayName2 = DAY_SHORT[parseInt(s.day2)];

  // sessions grouped by week
  let sessRows = '';
  for (let w=1; w<=TOTAL_WEEKS; w++) {
    const wSess = s.sessions.filter(ss=>ss.weekNum===w);
    if (!wSess.length) continue;
    const dots = wSess.map((ss,i)=>{
      const idx = s.sessions.indexOf(ss);
      const icon = {done:'✓',cancel:'✕',transfer:'→',pending:String(idx+1)}[ss.status];
      const dateStr = ss.date ? displayDate(ss.date) : '—';
      const timeStr = ss.time || '—';
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer" onclick="openSessionModal(${s.id},${idx})">
        <div class="sess-dot ${statusClass(ss.status)}" title="${dateStr} ${timeStr}">${icon}</div>
        <div style="font-size:9px;color:var(--text3);text-align:center;line-height:1.3">${dateStr}<br>${timeStr}</div>
      </div>`;
    }).join('');
    sessRows += `<div class="week-row" style="align-items:flex-start"><span class="week-lbl" style="margin-top:6px">Εβδ. ${w}</span>${dots}</div>`;
  }
  if (!sessRows) sessRows = `<div class="week-row"><span style="font-size:12px;color:var(--text3);font-style:italic">Δεν έχουν οριστεί μαθήματα</span></div>`;

  let balHtml = '';
  if (balance>0) balHtml = `<span class="balance-due">−€${balance}</span>`;
  else if (balance<0) balHtml = `<span class="balance-adv">+€${Math.abs(balance)}</span>`;
  else if (owed>0) balHtml = `<span class="balance-ok">✓ Εξοφλημένο</span>`;

  return `<div class="student-card" id="sc-${s.id}">
    <div class="sc-top" onclick="toggleCard(${s.id})">
      <div class="sc-avatar ${s.cls==='G'?'av-g':'av-b'}">${initials(s.name)}</div>
      <div class="sc-info">
        <div class="sc-name">${s.name}</div>
        <div class="sc-meta">${dayName1} ${s.time1} · ${dayName2} ${s.time2}</div>
      </div>
      <div class="sc-right">
        <div class="sc-hours">${done*2}h</div>
        <div class="sc-hlabel">${done}/${total} μαθ.</div>
      </div>
      <span class="sc-chevron" id="chev-${s.id}">▾</span>
    </div>
    <div class="sc-body" id="body-${s.id}">
      <div class="sessions-legend">
        <span class="leg"><span class="leg-dot" style="background:rgba(16,185,129,.3)"></span>Έγινε</span>
        <span class="leg"><span class="leg-dot" style="background:rgba(244,63,94,.25)"></span>Ακυρώθηκε</span>
        <span class="leg"><span class="leg-dot" style="background:rgba(245,158,11,.25)"></span>Μεταφέρθηκε</span>
        <span class="leg"><span class="leg-dot" style="background:var(--surf2)"></span>Εκκρεμεί</span>
      </div>
      <div class="sessions-weeks">${sessRows}</div>
      <div class="pay-row">
        <span>Πληρωμές</span>
        <span>€${s.paid} / €${owed} ${balHtml}</span>
      </div>
      <div class="pay-bar"><div class="pay-fill" style="width:${payPct}%"></div></div>
      <div class="notes-label">Σημειώσεις</div>
      <textarea class="notes-ta" rows="2" placeholder="Ελεύθερες σημειώσεις..." oninput="saveNote(${s.id},this.value)">${s.notes}</textarea>
      <div class="action-row">
        <button class="act-btn primary" onclick="openEditModal(${s.id})">✎ Επεξεργασία</button>
        <button class="act-btn" onclick="exportStudent(${s.id})">⬇ Εξαγωγή</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  document.getElementById('body-'+id).classList.toggle('open');
  const ch = document.getElementById('chev-'+id);
  ch.classList.toggle('open');
}

// ── SESSION MODAL ────────────────────────────────────────────────────
function openSessionModal(sid, idx) {
  editingStudentId = sid;
  editingSessionIdx = idx;
  const s = students.find(x=>x.id===sid);
  const sess = s.sessions[idx];
  const dateLabel = sess.date ? displayDate(sess.date) : 'χωρίς ημερομηνία';
  document.getElementById('sessModalTitle').textContent = s.name+' · Εβδ.'+sess.weekNum+'/'+sess.sessNum+' · '+dateLabel;
  document.getElementById('sess-date').value = sess.date||'';
  document.getElementById('sess-time').value = sess.time||'';
  document.getElementById('sess-status').value = sess.status;
  document.getElementById('sess-note').value = sess.note||'';
  // Update date/time label to make it obvious they are editable
  const dateLbl = document.querySelector('#sessionModal label[for-field="date"]');
  openModal('sessionModal');
}

function saveSession() {
  const s = students.find(x=>x.id===editingStudentId);
  const sess = s.sessions[editingSessionIdx];
  sess.status = document.getElementById('sess-status').value;
  sess.date = document.getElementById('sess-date').value;
  sess.time = document.getElementById('sess-time').value;
  sess.note = document.getElementById('sess-note').value;
  closeModal('sessionModal');
  scheduleSync();
  render();
  showToast('Αποθηκεύτηκε ✓');
}

// ── ADD / EDIT STUDENT ───────────────────────────────────────────────
function addStudent() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) return;
  const cls = document.getElementById('new-class').value;
  const d1 = parseInt(document.getElementById('new-day1').value);
  const t1 = document.getElementById('new-time1').value;
  const d2 = parseInt(document.getElementById('new-day2').value);
  const t2 = document.getElementById('new-time2').value;
  const price = parseInt(document.getElementById('new-price').value)||40;
  const total = parseInt(document.getElementById('new-total').value)||10;
  const s = {id:nextId++,name,cls,day1:d1,time1:t1,day2:d2,time2:t2,price,paid:0,notes:''};
  s.sessions = buildSessions(d1,t1,d2,t2,total);
  students.push(s);
  closeModal('addModal');
  scheduleSync();
  render();
  showToast('Προστέθηκε ο/η '+name);
}

function openEditModal(id) {
  editingStudentId = id;
  const s = students.find(x=>x.id===id);
  document.getElementById('edit-name').value = s.name;
  document.getElementById('edit-day1').value = s.day1;
  document.getElementById('edit-time1').value = s.time1;
  document.getElementById('edit-day2').value = s.day2;
  document.getElementById('edit-time2').value = s.time2;
  document.getElementById('edit-price').value = s.price;
  document.getElementById('edit-paid').value = s.paid;
  openModal('editModal');
}

function saveEdit() {
  const s = students.find(x=>x.id===editingStudentId);
  s.name = document.getElementById('edit-name').value;
  s.day1 = parseInt(document.getElementById('edit-day1').value);
  s.time1 = document.getElementById('edit-time1').value;
  s.day2 = parseInt(document.getElementById('edit-day2').value);
  s.time2 = document.getElementById('edit-time2').value;
  s.price = parseInt(document.getElementById('edit-price').value)||40;
  s.paid = parseInt(document.getElementById('edit-paid').value)||0;
  closeModal('editModal');
  scheduleSync();
  render();
  showToast('Αποθηκεύτηκε ✓');
}

function saveNote(id, val) {
  const s = students.find(x=>x.id===id);
  if (s) { s.notes = val; scheduleSync(); }
}

// ── WEEKLY VIEW ──────────────────────────────────────────────────────
function changeWeek(d) {
  currentWeek = Math.max(1, Math.min(TOTAL_WEEKS, currentWeek+d));
  renderWeekly();
}

function renderWeekly() {
  const {start, end} = weekDateRange(currentWeek);
  document.getElementById('weekTitle').textContent = 'Εβδομάδα '+currentWeek+' / '+TOTAL_WEEKS;
  document.getElementById('weekSub').textContent =
    start.getDate()+' '+MONTH_SHORT[start.getMonth()]+' – '+end.getDate()+' '+MONTH_SHORT[end.getMonth()]+' 2026';

  // collect all sessions this week
  const daySessions = [[], [], [], [], []]; // Mon-Fri
  students.forEach(s => {
    s.sessions.filter(ss=>ss.weekNum===currentWeek).forEach(ss => {
      const d = parseDateStr(ss.date);
      let dayIdx = -1;
      if (d) {
        const wd = d.getDay();
        dayIdx = wd===0?6:wd-1;
      } else {
        // infer from day1/day2
        const sIdx = s.sessions.indexOf(ss);
        dayIdx = ss.sessNum===1 ? parseInt(s.day1) : parseInt(s.day2);
      }
      if (dayIdx>=0 && dayIdx<=4) {
        daySessions[dayIdx].push({s, ss});
      }
    });
  });

  let html = '';
  for (let d=0; d<5; d++) {
    const dayDate = new Date(start);
    dayDate.setDate(start.getDate()+d);
    const dateStr = dayDate.getDate()+' '+MONTH_SHORT[dayDate.getMonth()];
    const items = daySessions[d].sort((a,b)=>(a.ss.time||'00:00').localeCompare(b.ss.time||'00:00'));
    html += `<div class="day-block">
      <div class="day-header">${DAY_NAMES[d]} <span class="day-date">${dateStr}</span></div>`;
    if (!items.length) {
      html += `<div class="day-empty">Δεν υπάρχουν μαθήματα</div>`;
    } else {
      items.forEach(({s, ss}) => {
        const idx = s.sessions.indexOf(ss);
        html += `<div class="lesson-card" onclick="openSessionModal(${s.id},${idx})">
          <div class="lc-time">${ss.time||'—'}</div>
          <div class="lc-info">
            <div class="lc-name">${s.name}</div>
            <div class="lc-meta">${s.cls==='G'?'Γ΄ Λυκείου':'Β΄ Λυκείου'} · Εβδ.${ss.weekNum}/${ss.sessNum}${ss.note?' · '+ss.note:''}</div>
          </div>
          <span class="lc-status ${lessonStatusClass(ss.status)}">${statusLabel(ss.status)}</span>
        </div>`;
      });
    }
    html += '</div>';
  }
  document.getElementById('weeklyView').innerHTML = html;
}

// ── PERIOD VIEW ──────────────────────────────────────────────────────
function setPeriodTab(tab, btn) {
  currentPeriodTab = tab;
  document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('periodCalendar').style.display = tab==='calendar'?'block':'none';
  document.getElementById('periodTable').style.display = tab==='table'?'block':'none';
}

function renderPeriod() {
  renderCalendar();
  renderPeriodTable();
}

function renderCalendar() {
  // Build June–July 2026 calendar
  const months = [
    {year:2026, month:5, label:'Ιούνιος 2026'},
    {year:2026, month:6, label:'Ιούλιος 2026'}
  ];
  let html = '';
  months.forEach(({year, month, label}) => {
    html += `<div style="margin-bottom:1.25rem">
      <div style="font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:.5rem">${label}</div>
      <div class="cal-grid">`;
    DAY_SHORT.forEach(d => html += `<div class="cal-head">${d.slice(0,2)}</div>`);

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month+1, 0);
    let startWd = firstDay.getDay();
    startWd = startWd===0?6:startWd-1;

    for (let i=0; i<startWd; i++) html += `<div class="cal-day inactive"></div>`;

    for (let day=1; day<=lastDay.getDate(); day++) {
      const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      const dt = new Date(year, month, day);
      const isToday = dateStr === fmtDate(new Date());
      const inPeriod = dt >= PERIOD_START && dt < new Date(PERIOD_START.getFullYear(), PERIOD_START.getMonth(), PERIOD_START.getDate()+35);
      
      // gather lessons
      const lessons = [];
      students.forEach(s => {
        s.sessions.forEach((ss, idx) => {
          if (ss.date === dateStr) lessons.push({s, ss, idx});
        });
        // also show if no date but inferred
        if (!lessons.some(l=>l.s===s)) {
          s.sessions.forEach((ss, idx) => {
            if (!ss.date && inPeriod) {
              const weekNum = ss.weekNum;
              const {start:wStart} = weekDateRange(weekNum);
              const dayOffset = ss.sessNum===1 ? parseInt(s.day1) : parseInt(s.day2);
              const expectedDate = new Date(wStart);
              expectedDate.setDate(wStart.getDate()+dayOffset);
              if (fmtDate(expectedDate)===dateStr) lessons.push({s, ss, idx});
            }
          });
        }
      });

      html += `<div class="cal-day${isToday?' today':''}">
        <div class="cal-day-num">${day}</div>`;
      lessons.slice(0,3).forEach(({s,ss,idx}) => {
        html += `<div class="cal-lesson-pill ${calPillClass(ss.status)}" onclick="openSessionModal(${s.id},${idx})" title="${s.name} ${ss.time||''}">${s.name.slice(0,4)}</div>`;
      });
      if (lessons.length>3) html += `<div style="font-size:8px;color:var(--text3)">+${lessons.length-3}</div>`;
      html += '</div>';
    }
    html += '</div></div>';
  });
  document.getElementById('periodCalendar').innerHTML = html;
}

function renderPeriodTable() {
  let html = `<div style="overflow-x:auto"><table class="period-table">
    <thead><tr>
      <th>Μαθητής</th>
      <th>Τάξη</th>
      <th>Μαθήματα (ανά εβδομάδα)</th>
      <th>Ώρες</th>
      <th>Πληρωμή</th>
    </tr></thead><tbody>`;

  students.forEach(s => {
    const done = s.sessions.filter(x=>x.status==='done').length;
    const total = s.sessions.length;
    const owed = done*s.price;
    const balance = owed-s.paid;
    // dots grouped by week
    let dotsCells = '';
    for (let w=1; w<=TOTAL_WEEKS; w++) {
      const wSess = s.sessions.filter(ss=>ss.weekNum===w);
      if (!wSess.length) { dotsCells += ''; continue; }
      wSess.forEach((ss,i)=>{
        const idx = s.sessions.indexOf(ss);
        const icon = {done:'✓',cancel:'✕',transfer:'→',pending:'·'}[ss.status];
        dotsCells += `<div class="pt-dot ${statusClass(ss.status)}" onclick="openSessionModal(${s.id},${idx})" title="Εβδ.${w}/${ss.sessNum} ${statusLabel(ss.status)}">${icon}</div>`;
      });
    }
    const balColor = balance>0?'var(--rose2)':balance<0?'var(--amber2)':'var(--green2)';
    const balStr = balance>0?'-€'+balance:balance<0?'+€'+Math.abs(balance):'✓';
    html += `<tr>
      <td><span class="pt-name">${s.name}</span></td>
      <td><span class="pt-badge ${s.cls==='G'?'pt-g':'pt-b'}">${s.cls==='G'?'Γ΄':'Β΄'}</span></td>
      <td><div class="pt-sessions">${dotsCells||'<span style="color:var(--text3);font-size:11px">—</span>'}</div></td>
      <td style="color:var(--cyan);font-weight:700">${done*2}h</td>
      <td style="color:${balColor};font-weight:600;font-size:12px">${balStr}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('periodTable').innerHTML = html;
}

// ── MODALS ───────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
});

// ── EXPORT ───────────────────────────────────────────────────────────
function exportStudent(id) {
  const s = students.find(x=>x.id===id);
  const done = s.sessions.filter(x=>x.status==='done').length;
  const owed = done*s.price;
  let txt = `=== ${s.name} — Καρυοφύλλης ===\n`;
  txt += `Τάξη: ${s.cls==='G'?'Γ΄':'Β΄'} Λυκείου\n`;
  txt += `Ημέρες: ${DAY_SHORT[s.day1]} ${s.time1} / ${DAY_SHORT[s.day2]} ${s.time2}\n`;
  txt += `Τιμή/δίωρο: €${s.price}\n\n`;
  txt += `ΜΑΘΗΜΑΤΑ:\n`;
  s.sessions.forEach((ss,i) => {
    txt += `Εβδ.${ss.weekNum}/${ss.sessNum}: ${statusLabel(ss.status)} ${ss.date?'('+displayDate(ss.date)+' '+ss.time+')':''} ${ss.note?'— '+ss.note:''}\n`;
  });
  txt += `\nΣύνολο ωρών: ${done*2}h\nΧρεωστούμενα: €${owed}\nΠληρωμένα: €${s.paid}\nΥπόλοιπο: €${owed-s.paid}\n`;
  txt += `\nΣημειώσεις: ${s.notes||'—'}\n`;
  
  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = s.name+'_ιδιαίτερα_2026.txt';
  a.click();
  showToast('Εξαγωγή '+s.name+' ✓');
}

// ── GOOGLE SHEETS SYNC ───────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYEH3aKyKD1NwjvuIM6Z3Nx7GGbpNHzdOiD-xETfDDbtfOEDWEakntbfpUg2wm3CYX/exec';
const LS_KEY = 'karyophyllis_tutoring_2026';
let syncStatus = 'idle'; // idle | syncing | ok | error

// ── LOCAL CACHE (fallback όταν είμαστε offline) ──────────────────────
function saveToStorage() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({ students, nextId, savedAt: new Date().toISOString() }));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.students && Array.isArray(data.students)) {
      students.length = 0;
      data.students.forEach(s => students.push(s));
      if (data.nextId) nextId = data.nextId;
      return data.savedAt;
    }
  } catch(e) {}
  return false;
}

// ── GOOGLE SHEETS API ────────────────────────────────────────────────
async function syncToSheets() {
  syncStatus = 'syncing';
  updateSyncIndicator();
  try {
    const resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveAll', students })
    });
    const result = await resp.json();
    if (result.ok) {
      syncStatus = 'ok';
      saveToStorage();
    } else {
      throw new Error(result.error || 'Unknown error');
    }
  } catch(e) {
    syncStatus = 'error';
    saveToStorage(); // αποθήκευσε τοπικά έστω
    console.warn('Sheets sync failed, saved locally:', e.message);
  }
  updateSyncIndicator();
}

async function loadFromSheets() {
  syncStatus = 'syncing';
  updateSyncIndicator();
  try {
    const resp = await fetch(SCRIPT_URL + '?action=getAll');
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    // Rebuild students with their sessions
    if (data.students && data.students.length > 0) {
      students.length = 0;
      data.students.forEach(s => {
        s.day1 = parseInt(s.day1);
        s.day2 = parseInt(s.day2);
        s.price = parseFloat(s.price) || 0;
        s.paid  = parseFloat(s.paid)  || 0;
        s.sessions = data.sessions
          ? data.sessions
              .filter(ss => String(ss.studentId) === String(s.id))
              .map(ss => ({
                ...ss,
                weekNum: parseInt(ss.weekNum),
                sessNum: parseInt(ss.sessNum),
              }))
          : [];
        students.push(s);
      });
      // find max id
      nextId = Math.max(...students.map(s => parseInt(s.id) || 0)) + 1;
      saveToStorage();
      syncStatus = 'ok';
      updateSyncIndicator();
      return true;
    }
    syncStatus = 'ok';
    updateSyncIndicator();
    return false;
  } catch(e) {
    syncStatus = 'error';
    updateSyncIndicator();
    console.warn('Sheets load failed:', e.message);
    return false;
  }
}

// ── SYNC INDICATOR ───────────────────────────────────────────────────
function updateSyncIndicator() {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const icons = { idle:'☁️', syncing:'⟳', ok:'✓', error:'⚠️' };
  const colors = { idle:'var(--text3)', syncing:'var(--amber)', ok:'var(--green)', error:'var(--rose)' };
  const labels = { idle:'Αδρανές', syncing:'Συγχρονισμός...', ok:'Συγχρονίστηκε', error:'Αποθηκεύτηκε τοπικά' };
  el.style.color = colors[syncStatus];
  el.textContent = icons[syncStatus] + ' ' + labels[syncStatus];
}

// ── STATUS BAR ───────────────────────────────────────────────────────
function renderStorageBar(savedAt) {
  const existing = document.getElementById('storageBar');
  if (existing) existing.remove();
  const bar = document.createElement('div');
  bar.id = 'storageBar';
  bar.style.cssText = `
    position:fixed;bottom:0;left:0;right:0;z-index:60;
    background:var(--surf);border-top:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    padding:.45rem 1rem;gap:8px;font-size:11px;flex-wrap:wrap;
  `;
  const ts = savedAt
    ? new Date(savedAt).toLocaleString('el-GR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
    : '—';
  bar.innerHTML = `
    <span style="color:var(--text3)">
      💾 <span style="color:var(--green)">${ts}</span>
      &nbsp;·&nbsp;
      <span id="syncStatus" style="color:var(--text3)">☁️ Αδρανές</span>
    </span>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button onclick="forceSyncToSheets()" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid rgba(6,182,212,.35);background:transparent;color:var(--cyan);cursor:pointer;font-family:'Sora',sans-serif">☁ Sync τώρα</button>
      <button onclick="exportJSON()" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Sora',sans-serif">⬇ Backup</button>
      <button onclick="importJSON()" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Sora',sans-serif">⬆ Φόρτωση</button>
      <button onclick="clearStorage()" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid rgba(244,63,94,.3);background:transparent;color:var(--rose2);cursor:pointer;font-family:'Sora',sans-serif">✕ Reset</button>
    </div>
  `;
  document.body.appendChild(bar);
  updateSyncIndicator();
}

async function forceSyncToSheets() {
  await syncToSheets();
  showToast(syncStatus === 'ok' ? 'Συγχρονίστηκε με Google Sheets ✓' : 'Αποθηκεύτηκε τοπικά (έλεγξε σύνδεση)');
}

function clearStorage() {
  if (!confirm('Διαγραφή τοπικών δεδομένων και επαναφόρτωση από Google Sheets; Δεν αναιρείται.')) return;
  localStorage.removeItem(LS_KEY);
  location.reload();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify({students, nextId}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tutoring_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  showToast('Backup αποθηκεύτηκε ✓');
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.students) throw new Error('Invalid format');
        students.length = 0;
        data.students.forEach(s => students.push(s));
        if (data.nextId) nextId = data.nextId;
        render();
        await syncToSheets();
        showToast('Backup φορτώθηκε και συγχρονίστηκε ✓');
      } catch(e) { alert('Σφάλμα ανάγνωσης αρχείου.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── AUTO SYNC — μετά από κάθε αλλαγή με debounce 2sec ──────────────
let syncTimer = null;
function scheduleSync() {
  saveToStorage();
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => syncToSheets(), 2000);
}

// ── MAIN RENDER ──────────────────────────────────────────────────────
function render() {
  renderStats();
  renderStudents();
  if (document.getElementById('tab-weekly').classList.contains('active')) renderWeekly();
  if (document.getElementById('tab-period').classList.contains('active')) renderPeriod();
  renderStorageBar(localStorage.getItem(LS_KEY)
    ? JSON.parse(localStorage.getItem(LS_KEY)).savedAt
    : null);
}

// ── INIT — φόρτωσε από Sheets, fallback στο localStorage ─────────────
(async () => {
  // Δείξε τοπικά δεδομένα αμέσως (fast start)
  const localSavedAt = loadFromStorage();
  if (localSavedAt) {
    render();
    showToast('Φορτώθηκε τοπικά — συγχρονισμός...');
  } else {
    students.forEach(s => {
      if (!s.sessions) {
        const total = s.cls === 'G' ? 10 : (s.name === 'Ευφημία' ? 3 : 0);
        s.sessions = total > 0 ? buildSessions(s.day1, s.time1, s.day2, s.time2, total) : [];
      }
    });
    render();
  }

  // Φόρτωσε από Sheets (ενημερωμένα δεδομένα)
  const sheetsLoaded = await loadFromSheets();
  if (sheetsLoaded) {
    render();
    showToast('Συγχρονίστηκε από Google Sheets ✓');
  }
})();
</script>
